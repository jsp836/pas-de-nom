<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Défends le Coffre ! v7.9 (Diagonales Forêt)</title>
    <!-- Chargement officiel du kit de developpement Poki -->
    <script src="https://game-cdn.poki.com/scripts/v2/poki-sdk.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0f1a0f; /* Thème forêt sombre */
            touch-action: none; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
            background-color: #2d4a2d; /* Fond forêt */
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <canvas id="jeuCanvas"></canvas>

    <script>
        const canvas = document.getElementById("jeuCanvas");
        const ctx = canvas.getContext("2d");

        let pokiSDKReady = false;

        // Initialisation de l'API Poki
        PokiSDK.init().then(() => {
            pokiSDKReady = true;
            console.log("Poki SDK initialisé avec succès !");
        }).catch(() => {
            console.log("Erreur d'initialisation Poki, lancement du jeu classique.");
        });

        let taille_coffre = 100; 
        let joueur_largeur = 50;   
        let joueur_hauteur = 50;   
        let joueur_x = 0;
        let joueur_y = 0;
        let cible_x = 0;
        let cible_y = 0;

        let tempsPrecedent = performance.now();
        const tickRate = 1000 / 60; 
        let accumulateur = 0;

        let onglet_actif = "COMBAT"; 
        let or_total = 0;

        let perso_choisi = "chevalier";
        const types_personnages = {
            chevalier: { 
                nom: "CHEVALIER", couleur: "#a6a6a6", prix: 0, debloque: true,
                vit_base: 8, deg_base: 500, niv_degats: 1, niv_vitesse: 1 
            },
            ninja: { 
                nom: "NINJA", couleur: "#2e2e2e", prix: 100, debloque: false,
                vit_base: 12, deg_base: 300, niv_degats: 1, niv_vitesse: 1 
            },
            tank: { 
                nom: "TANK", couleur: "#5e2585", prix: 200, debloque: false,
                vit_base: 3, deg_base: 1000, niv_degats: 1, niv_vitesse: 1 
            }
        };

        let decor = [];
        function rafraichirDecor() {
            decor = [];
            let lChemin = Math.min(canvas.width, canvas.height) * 0.18 / 2;
            for(let i=0; i<80; i++){
                let x = Math.random() * canvas.width;
                let y = Math.random() * canvas.height;
                // Vérifier si sur le coffre
                if(Math.hypot(x - canvas.width/2, y - canvas.height/2) < taille_coffre * 0.7) continue;
                // Vérifier si sur les chemins diagonaux
                let d1 = Math.abs(x - y) / Math.sqrt(2);
                let d2 = Math.abs(x + y - canvas.height) / Math.sqrt(2);
                if(d1 < lChemin || d2 < lChemin) continue;
                decor.push({x, y, s: 4 + Math.random() * 8, type: Math.random() > 0.5 ? 'rond' : 'carre'});
            }
        }

        function dessinerCheminDiagonale() {
            let l = Math.min(canvas.width, canvas.height) * 0.18;
            ctx.fillStyle = "#5c4033"; // Couleur terre battue
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(0, 0); ctx.lineTo(canvas.width, canvas.height);
            ctx.lineTo(canvas.width - l, canvas.height); ctx.lineTo(0, l);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(canvas.width, 0); ctx.lineTo(0, canvas.height);
            ctx.lineTo(l, canvas.height); ctx.lineTo(canvas.width, l);
            ctx.fill();
            ctx.restore();
        }

        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function jouerSon(type) {
            initAudio();
            if (!audioCtx) return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            let maintenant = audioCtx.currentTime;
            if (type === "clic") {
                osc.type = "sine"; osc.frequency.setValueAtTime(400, maintenant); osc.frequency.exponentialRampToValueAtTime(800, maintenant + 0.05);
                gain.gain.setValueAtTime(0.05, maintenant); gain.gain.linearRampToValueAtTime(0, maintenant + 0.05);
                osc.start(maintenant); osc.stop(maintenant + 0.05);
            } else if (type === "hit") {
                if (perso_choisi === "chevalier") {
                    osc.type = "sine"; osc.frequency.setValueAtTime(600, maintenant); osc.frequency.exponentialRampToValueAtTime(150, maintenant + 0.08); gain.gain.setValueAtTime(0.1, maintenant);
                } else if (perso_choisi === "ninja") {
                    osc.type = "triangle"; osc.frequency.setValueAtTime(800, maintenant); osc.frequency.exponentialRampToValueAtTime(300, maintenant + 0.05); gain.gain.setValueAtTime(0.08, maintenant);
                } else {
                    osc.type = "sawtooth"; osc.frequency.setValueAtTime(120, maintenant); osc.frequency.linearRampToValueAtTime(30, maintenant + 0.15); gain.gain.setValueAtTime(0.2, maintenant);
                }
                gain.gain.linearRampToValueAtTime(0, maintenant + 0.1); osc.start(maintenant); osc.stop(maintenant + 0.15);
            }
        }

        function dessinerHeros(type, x, y, w, h) {
            if (type === "chevalier") {
                ctx.fillStyle = "#8a8a8a"; ctx.fillRect(x + w*0.15, y + h*0.3, w*0.7, h*0.6);
            } else if (type === "ninja") {
                ctx.fillStyle = "#242424"; ctx.fillRect(x + w*0.2, y + h*0.25, w*0.6, h*0.65);
            } else if (type === "tank") {
                ctx.fillStyle = "#5e2585"; ctx.fillRect(x + w*0.05, y + h*0.2, w*0.9, h*0.7);
            }
        }

        function sauvegarderDonnees() {
            const d = { or_total, perso_choisi, ninja_debloque: types_personnages.ninja.debloque, tank_debloque: types_personnages.tank.debloque };
            localStorage.setItem("defends_le_coffre_sauvegarde", JSON.stringify(d));
        }

        function chargerDonnees() {
            const sauvegarde = localStorage.getItem("defends_le_coffre_sauvegarde");
            if (sauvegarde) {
                const d = JSON.parse(sauvegarde);
                or_total = d.or_total ?? 0;
                perso_choisi = d.perso_choisi ?? "chevalier";
                types_personnages.ninja.debloque = d.ninja_debloque ?? false;
                types_personnages.tank.debloque = d.tank_debloque ?? false;
            }
        }

        let hp_coffre = 10000;
        let etat_jeu = "MENU_PRINCIPAL"; 
        let score = 0;
        let or_gagne = 0;
        let vague = 1;
        let liste_ennemis = [];

        function redimensionner() { 
            canvas.width = window.innerWidth; 
            canvas.height = window.innerHeight; 
            taille_coffre = Math.min(canvas.width, canvas.height) * 0.2;
            rafraichirDecor();
        }
        window.addEventListener('resize', redimensionner);
        redimensionner();

        function dessiner() {
            ctx.fillStyle = "#2d4a2d"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Fond décor
            decor.forEach(d => {
                ctx.fillStyle = "#1a4a1a";
                if(d.type === 'rond') { ctx.beginPath(); ctx.arc(d.x, d.y, d.s, 0, Math.PI*2); ctx.fill(); } 
                else { ctx.fillRect(d.x, d.y, d.s, d.s); }
            });

            dessinerCheminDiagonale();
            
            ctx.fillStyle = "#FFD700";
            ctx.fillRect(canvas.width/2 - 30, canvas.height/2 - 30, 60, 60);

            // Dessin des ennemis
            liste_ennemis.forEach(m => {
                ctx.fillStyle = "#FF4444";
                ctx.fillRect(m.x, m.y, 30, 30);
            });

            requestAnimationFrame(dessiner);
        }

        window.onload = () => {
            PokiSDK.gameLoadingFinished();
            chargerDonnees();
            dessiner();
        };

    </script>
</body>
</html>
