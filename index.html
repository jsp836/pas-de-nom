<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Défends le Coffre ! v7.7</title>
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background-color: #111; touch-action: none; display: flex;
            align-items: center; justify-content: center;
            font-family: 'Segoe UI', sans-serif; user-select: none;
        }
        canvas { display: block; background-color: #1e1e1e; }
    </style>
</head>
<body>

    <canvas id="jeuCanvas"></canvas>

    <script>
        const canvas = document.getElementById("jeuCanvas");
        const ctx = canvas.getContext("2d");

        let taille_coffre = 100, joueur_largeur = 50, joueur_hauteur = 50;
        let joueur_x = 0, joueur_y = 0, cible_x = 0, cible_y = 0;
        let tempsPrecedent = performance.now(), accumulateur = 0;
        const tickRate = 1000 / 60;

        let onglet_actif = "COMBAT", or_total = 0, perso_choisi = "chevalier";

        const types_personnages = {
            chevalier: { nom: "CHEVALIER", couleur: "#a6a6a6", prix: 0, debloque: true, vit_base: 8, deg_base: 500, niv_degats: 1, niv_vitesse: 1 },
            ninja: { nom: "NINJA", couleur: "#2e2e2e", prix: 100, debloque: false, vit_base: 12, deg_base: 300, niv_degats: 1, niv_vitesse: 1 },
            tank: { nom: "TANK", couleur: "#5e2585", prix: 200, debloque: false, vit_base: 5, deg_base: 1000, niv_degats: 1, niv_vitesse: 1 }
        };

        // --- GESTION DU SON AUDIO ---
        let audioCtx = null;
        function jouerSon(type) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            let osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            let t = audioCtx.currentTime;

            if (type === "clic") {
                osc.frequency.setValueAtTime(400, t); osc.frequency.exponentialRampToValueAtTime(800, t + 0.05);
                gain.gain.setValueAtTime(0.05, t); gain.gain.linearRampToValueAtTime(0, t + 0.05);
                osc.start(t); osc.stop(t + 0.05);
            } else if (type === "hit") {
                osc.type = "triangle"; osc.frequency.setValueAtTime(150, t);
                gain.gain.setValueAtTime(0.15, t); gain.gain.linearRampToValueAtTime(0, t + 0.08);
                osc.start(t); osc.stop(t + 0.08);
            } else if (type === "explosion") {
                osc.type = "sawtooth"; osc.frequency.setValueAtTime(100, t); osc.frequency.linearRampToValueAtTime(20, t + 0.3);
                gain.gain.setValueAtTime(0.2, t); gain.gain.linearRampToValueAtTime(0, t + 0.3);
                osc.start(t); osc.stop(t + 0.3);
            } else if (type === "levelup") {
                osc.frequency.setValueAtTime(300, t); osc.frequency.setValueAtTime(600, t + 0.15);
                gain.gain.setValueAtTime(0.1, t); gain.gain.linearRampToValueAtTime(0, t + 0.3);
                osc.start(t); osc.stop(t + 0.3);
            }
        }

        // --- GRAPHISMES DES JOUEURS ---
        function dessinerHeros(type, x, y, w, h) {
            if (type === "chevalier") {
                ctx.fillStyle = "#8a8a8a"; ctx.fillRect(x + w*0.15, y + h*0.3, w*0.7, h*0.6);
                ctx.fillStyle = "#b8b8b8"; ctx.fillRect(x + w*0.25, y, w*0.5, h*0.35);
                ctx.fillStyle = "#3a3a3a"; ctx.fillRect(x + w*0.3, y + h*0.12, w*0.4, h*0.1);
                ctx.fillStyle = "#ffcc00"; ctx.fillRect(x + w*0.45, y + h*0.12, w*0.1, h*0.1);
            } else if (type === "ninja") {
                ctx.fillStyle = "#242424"; ctx.fillRect(x + w*0.2, y + h*0.25, w*0.6, h*0.65);
                ctx.fillStyle = "#1e1e1e"; ctx.fillRect(x + w*0.28, y, w*0.44, h*0.3);
                ctx.fillStyle = "#00bfff"; ctx.fillRect(x + w*0.28, y + h*0.05, w*0.44, h*0.08);
                ctx.fillStyle = "#ffebad"; ctx.fillRect(x + w*0.35, y + h*0.15, w*0.3, h*0.08);
            } else {
                ctx.fillStyle = "#5e2585"; ctx.fillRect(x + w*0.05, y + h*0.2, w*0.9, h*0.7);
                ctx.fillStyle = "#9400d3"; ctx.fillRect(x, y + h*0.15, w*0.22, h*0.22); ctx.fillRect(x + w*0.78, y + h*0.15, w*0.22, h*0.22);
                ctx.fillStyle = "#42324d"; ctx.fillRect(x + w*0.3, y - h*0.05, w*0.4, h*0.3);
            }
        }

        // --- DESSIN DES ENNEMIS ET CORNES ---
        function dessinerGrandesCornes(e) {
            ctx.fillStyle = "#111111"; 
            let ep = Math.max(3, e.largeur * 0.08);
            ctx.fillRect(e.x - ep, e.y + 2, ep, ep); ctx.fillRect(e.x - ep*2, e.y, ep, ep);
            ctx.fillRect(e.x - ep*2, e.y - ep, ep, ep); ctx.fillRect(e.x - ep, e.y - ep*2, ep, ep);
            ctx.fillRect(e.x + e.largeur, e.y + 2, ep, ep); ctx.fillRect(e.x + e.largeur + ep, e.y, ep, ep);
            ctx.fillRect(e.x + e.largeur + ep, e.y - ep, ep, ep); ctx.fillRect(e.x + e.largeur, e.y - ep*2, ep, ep);
        }

        // --- SAUVEGARDE DE DONNÉES ---
        function sauvegarderDonnees() {
            const d = {
                or_total: or_total, perso_choisi: perso_choisi,
                ninja_debloque: types_personnages.ninja.debloque, tank_debloque: types_personnages.tank.debloque,
                chevalier_deg: types_personnages.chevalier.niv_degats, chevalier_vit: types_personnages.chevalier.niv_vitesse,
                ninja_deg: types_personnages.ninja.niv_degats, ninja_vit: types_personnages.ninja.niv_vitesse,
                tank_deg: types_personnages.tank.niv_degats, tank_vit: types_personnages.tank.niv_vitesse
            };
            localStorage.setItem("defends_le_coffre_sauvegarde", JSON.stringify(d));
        }

        function chargerDonnees() {
            const sauvegarde = localStorage.getItem("defends_le_coffre_sauvegarde");
            if (sauvegarde) {
                try {
                    const d = JSON.parse(sauvegarde);
                    or_total = d.or_total ?? 0; perso_choisi = d.perso_choisi ?? "chevalier";
                    types_personnages.ninja.debloque = d.ninja_debloque ?? false;
                    types_personnages.tank.debloque = d.tank_debloque ?? false;
                    types_personnages.chevalier.niv_degats = d.chevalier_deg ?? 1;
                    types_personnages.chevalier.niv_vitesse = d.chevalier_vit ?? 1;
                    types_personnages.ninja.niv_degats = d.ninja_deg ?? 1;
                    types_personnages.ninja.niv_vitesse = d.ninja_vit ?? 1;
                    types_personnages.tank.niv_degats = d.tank_deg ?? 1;
                    types_personnages.tank.niv_vitesse = d.tank_vit ?? 1;
                } catch (e) { console.error(e); }
            }
        }

        // --- MOTEUR ET ÉVÈNEMENTS ---
        let hp_coffre = 10000, max_hp_coffre = 10000, etat_jeu = "MENU_PRINCIPAL";
        let score = 0, or_gagne = 0, vague = 1, temps_vague_timer = 0;
        let joueur_niveau = 1, joueur_xp = 0, xp_necessaire = 100;
        let message_level_up = "", level_up_timer = 0, popups_degats = [];
        let liste_ennemis = [], dernier_spawn = 0, intervalle_spawn = 1200;
        let mode_tactile = false, touches = {};

        window.addEventListener("keydown", (e) => { touches[e.code] = true; mode_tactile = false; });
        window.addEventListener("keyup", (e) => touches[e.code] = false);

        function togglePleinEcran() {
            try {
                if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                    let el = document.documentElement;
                    if (el.requestFullscreen) el.requestFullscreen();
                    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
                } else {
                    if (document.exitFullscreen) document.exitFullscreen();
                    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                }
            } catch (e) { console.error(e); }
        }

        function verifierClicsMenus(x, y) {
            let cx = canvas.width / 2, cy = canvas.height / 2, by = canvas.height;

            if (etat_jeu === "MENU_PRINCIPAL") {
                // Bouton Plein Écran (En haut à gauche)
                if (x >= 20 && x <= 160 && y >= 25 && y <= 65) {
                    jouerSon("clic"); togglePleinEcran(); return true;
                }
                // Onglets bas
                if (y >= by - 60 && y <= by) {
                    jouerSon("clic"); onglet_actif = (x < canvas.width / 2) ? "AMELIORATIONS" : "COMBAT";
                    return true;
                }
                if (onglet_actif === "COMBAT") {
                    if (x >= cx - 110 && x <= cx + 110 && y >= cy + 10 && y <= cy + 75) {
                        jouerSon("clic"); demarrerLaVraiePartie(); return true;
                    }
                }
                if (onglet_actif === "AMELIORATIONS") {
                    if (x >= cx - 145 && x <= cx - 55 && y >= cy - 110 && y <= cy - 30) {
                        jouerSon("clic"); perso_choisi = "chevalier"; sauvegarderDonnees(); return true;
                    }
                    if (x >= cx - 45 && x <= cx + 45 && y >= cy - 110 && y <= cy - 30) {
                        let n = types_personnages.ninja;
                        if (n.debloque) { jouerSon("clic"); perso_choisi = "ninja"; }
                        else if (or_total >= n.prix) { jouerSon("levelup"); or_total -= n.prix; n.debloque = true; perso_choisi = "ninja"; }
                        sauvegarderDonnees(); return true;
                    }
                    if (x >= cx + 55 && x <= cx + 145 && y >= cy - 110 && y <= cy - 30) {
                        let t = types_personnages.tank;
                        if (t.debloque) { jouerSon("clic"); perso_choisi = "tank"; }
                        else if (or_total >= t.prix) { jouerSon("levelup"); or_total -= t.prix; t.debloque = true; perso_choisi = "tank"; }
                        sauvegarderDonnees(); return true;
                    }

                    let h = types_personnages[perso_choisi];
                    let c_deg = h.niv_degats * 10, c_vit = h.niv_vitesse * 15;
                    if (x >= cx - 145 && x <= cx - 5 && y >= cy + 45 && y <= cy + 100) {
                        if (or_total >= c_deg) { jouerSon("levelup"); or_total -= c_deg; h.niv_degats++; sauvegarderDonnees(); }
                        return true;
                    }
                    if (x >= cx + 5 && x <= cx + 145 && y >= cy + 45 && y <= cy + 100) {
                        if (or_total >= c_vit) { jouerSon("levelup"); or_total -= c_vit; h.niv_vitesse++; sauvegarderDonnees(); }
                        return true;
                    }
                }
            }
            if (etat_jeu === "GAMEOVER") {
                if (x >= cx - 120 && x <= cx + 120 && y >= cy + 60 && y <= cy + 110) {
                    jouerSon("clic"); etat_jeu = "MENU_PRINCIPAL"; onglet_actif = "COMBAT"; sauvegarderDonnees(); return true;
                }
            }
            return false;
        }

        // --- GESTION DU TACTILE ---
        function goulotDoigt(clientX, clientY) {
            if (verifierClicsMenus(clientX, clientY)) return;
            if (etat_jeu === "JEU") {
                mode_tactile = true;
                cible_x = clientX - joueur_largeur / 2; cible_y = clientY - joueur_hauteur / 2;
            }
        }

        canvas.addEventListener("mousedown", (e) => goulotDoigt(e.clientX, e.clientY));
        canvas.addEventListener("touchstart", (e) => { if(e.touches.length > 0) goulotDoigt(e.touches[0].clientX, e.touches[0].clientY); });
        canvas.addEventListener("touchmove", (e) => {
            e.preventDefault();
            if(etat_jeu === "JEU" && e.touches.length > 0) {
                cible_x = e.touches[0].clientX - joueur_largeur / 2; cible_y = e.touches[0].clientY - joueur_hauteur / 2;
                mode_tactile = true;
            }
        }, { passive: false });

        function redimensionner() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            let tm = Math.min(canvas.width, canvas.height);
            taille_coffre = tm * 0.22; joueur_largeur = tm * 0.11; joueur_hauteur = tm * 0.11;
            if (etat_jeu === "JEU") {
                joueur_x = canvas.width / 2 - joueur_largeur / 2; joueur_y = canvas.height / 2 - joueur_hauteur / 2 + (taille_coffre * 1.1);
                cible_x = joueur_x; cible_y = joueur_y;
            }
        }
        window.addEventListener('resize', redimensionner);

        function demarrerLaVraiePartie() {
            hp_coffre = 10000; score = 0; or_gagne = 0; vague = 1; temps_vague_timer = 0;
            joueur_niveau = 1; joueur_xp = 0; xp_necessaire = 100; intervalle_spawn = 1200;
            liste_ennemis = []; popups_degats = []; dernier_spawn = Date.now();
            mode_tactile = false; etat_jeu = "JEU"; redimensionner();
        }

        // --- ENNEMIS ET PHYSIQUE ---
        function faireSpawnEnnemis() {
            let coins = [{x:0, y:0}, {x:canvas.width, y:0}, {x:0, y:canvas.height}, {x:canvas.width, y:canvas.height}];
            let te = Math.min(canvas.width, canvas.height) * 0.082;
            coins.forEach(c => {
                let k = vague >= 2 && Math.random() < 0.35;
                liste_ennemis.push({
                    type: k ? "kamikaze" : "normal", x: c.x - (te/2), y: c.y - (te/2),
                    largeur: k ? te*0.75 : te, hauteur: k ? te*0.75 : te, vitesse: k ? (4+(vague-1)*0.4)*1.5 : Math.min(7.5, 4+(vague-1)*0.4),
                    hp: k ? (1000+(vague-1)*350)*0.4 : 1000+(vague-1)*350, max_hp: k ? (1000+(vague-1)*350)*0.4 : 1000+(vague-1)*350,
                    degats: k ? (100+(vague-1)*20)*1.5 : 100+(vague-1)*20, couleur: k ? "#ff9900" : "#ff4d4d", invulnerable_timer: 0
                });
            });
        }

        function collision(r1, r2) { return r1.x < r2.x + r2.largeur && r1.x + r1.largeur > r2.x && r1.y < r2.y + r2.hauteur && r1.y + r1.hauteur > r2.y; }

        function ajouterXP(m) {
            joueur_xp += m;
            if (joueur_xp >= xp_necessaire) {
                joueur_xp -= xp_necessaire; joueur_niveau++; xp_necessaire = Math.floor(xp_necessaire * 1.4);
                jouerSon("levelup");
                if (Math.random() < 0.5) { hp_coffre = Math.min(max_hp_coffre, hp_coffre + 1500); message_level_up = "COFFRE SOIGNÉ ! (+1500 HP)"; }
                else { score += 150; message_level_up = "BONUS SCORE ! (+150 PTS)"; }
                level_up_timer = 90;
            }
        }

        function updatePhysique() {
            let cx = canvas.width / 2, cy = canvas.height / 2;
            if (etat_jeu === "JEU") {
                let maintenant = Date.now(); temps_vague_timer += tickRate;
                if (temps_vague_timer >= 20000) { vague++; temps_vague_timer = 0; intervalle_spawn = Math.max(500, 1200 - (vague * 90)); }
                if (level_up_timer > 0) level_up_timer--;

                for (let i = popups_degats.length - 1; i >= 0; i--) {
                    popups_degats[i].y -= 1; popups_degats[i].vie--;
                    if (popups_degats[i].vie <= 0) popups_degats.splice(i, 1);
                }

                if (maintenant - dernier_spawn > intervalle_spawn) { faireSpawnEnnemis(); dernier_spawn = maintenant; }

                let p = types_personnages[perso_choisi];
                let vit = p.vit_base + (p.niv_vitesse - 1) * 0.8;
                let deg = p.deg_base + (p.niv_degats - 1) * 250;

                if (mode_tactile) {
                    let dx = cible_x - joueur_x, dy = cible_y - joueur_y, dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist > vit) { joueur_x += (dx/dist)*vit; joueur_y += (dy/dist)*vit; }
                    else { joueur_x = cible_x; joueur_y = cible_y; }
                } else {
                    if (touches["ArrowLeft"])  joueur_x -= vit;
                    if (touches["ArrowRight"]) joueur_x += vit;
                    if (touches["ArrowUp"])    joueur_y -= vit;
                    if (touches["ArrowDown"])  joueur_y += vit;
                }

                joueur_x = Math.max(0, Math.min(canvas.width - joueur_largeur, joueur_x));
                joueur_y = Math.max(0, Math.min(canvas.height - joueur_hauteur, joueur_y));

                let rCoffre = { x: cx - taille_coffre/2, y: cy - taille_coffre/2, largeur: taille_coffre, hauteur: taille_coffre };
                let rJoueur = { x: joueur_x, y: joueur_y, largeur: joueur_largeur, hauteur: joueur_hauteur };

                for (let i = liste_ennemis.length - 1; i >= 0; i--) {
                    let e = liste_ennemis[i];
                    let dx = (cx - e.largeur/2) - e.x, dy = (cy - e.hauteur/2) - e.y, dist = Math.sqrt(dx*dx + dy*dy);

                    if (dist > e.vitesse) { e.x += (dx/dist)*e.vitesse; e.y += (dy/dist)*e.vitesse; }
                    else { e.x = cx - e.largeur/2; e.y = cy - e.hauteur/2; }

                    if (e.invulnerable_timer > 0) e.invulnerable_timer--;

                    if (collision(rJoueur, e) && e.invulnerable_timer === 0) {
                        jouerSon("hit"); e.hp -= deg; e.invulnerable_timer = 15;
                        popups_degats.push({ x: e.x + e.largeur/2, y: e.y, texte: deg, vie: 30 });
                    }
                    if (collision(rCoffre, e)) {
                        jouerSon("explosion"); hp_coffre -= e.degats; liste_ennemis.splice(i, 1); continue;
                    }
                    if (e.hp <= 0) { liste_ennemis.splice(i, 1); score += 10; or_gagne += 1; or_total += 1; ajouterXP(e.type === "kamikaze" ? 35 : 20); }
                }
                if (hp_coffre <= 0) { hp_coffre = 0; etat_jeu = "GAMEOVER"; }
            }
        }

        function dessiner() {
            ctx.fillStyle = "#1e1e1e"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            let cx = canvas.width / 2, cy = canvas.height / 2, by = canvas.height;

            if (etat_jeu === "MENU_PRINCIPAL") {
                ctx.fillStyle = "rgba(15, 15, 22, 1)"; ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Bouton Plein Écran
                ctx.fillStyle = "#222535"; ctx.fillRect(20, 25, 140, 40);
                ctx.strokeStyle = "#fff"; ctx.strokeRect(20, 25, 140, 40);
                ctx.fillStyle = "#fff"; ctx.font = "bold 12px sans-serif"; ctx.textAlign = "center";
                ctx.fillText(document.fullscreenElement || document.webkitFullscreenElement ? "❌ QUITTER" : "📱 PLEIN ÉCRAN", 90, 49);

                // Or
                ctx.fillStyle = "#222535"; ctx.fillRect(cx - 110, 25, 220, 40);
                ctx.strokeStyle = "#ffff00"; ctx.strokeRect(cx - 110, 25, 220, 40);
                ctx.fillStyle = "#fff"; ctx.font = "bold 16px sans-serif";
                ctx.fillText("MON OR : " + or_total + " ⛁", cx, 51);

                if (onglet_actif === "COMBAT") {
                    ctx.fillStyle = "#ffff00"; ctx.font = "bold 24px sans-serif"; ctx.fillText("🛡️ DÉFENDS LE COFFRE", cx, cy - 130);
                    dessinerHeros(perso_choisi, cx - 35, cy - 100, 70, 70);
                    ctx.fillStyle = "#ff4747"; ctx.fillRect(cx - 110, cy + 10, 220, 65);
                    ctx.strokeStyle = "#fff"; ctx.lineWidth = 3; ctx.strokeRect(cx - 110, cy + 10, 220, 65);
                    ctx.fillStyle = "#fff"; ctx.font = "bold 22px sans-serif"; ctx.fillText("COMBAT ▶", cx, cy + 50);
                }

                if (onglet_actif === "AMELIORATIONS") {
                    ctx.fillStyle = "#fff"; ctx.font = "bold 15px sans-serif"; ctx.fillText("CHOIX DU HÉROS", cx, cy - 135);

                    // Chevalier, Ninja, Tank
                    let c = (perso_choisi === "chevalier");
                    ctx.strokeStyle = c ? "#ffaa00" : "#444"; ctx.fillStyle = c ? "#222a22" : "#222";
                    ctx.fillRect(cx - 145, cy - 110, 90, 80); ctx.strokeRect(cx - 145, cy - 110, 90, 80);
                    dessinerHeros("chevalier", cx - 115, cy - 105, 30, 30);
                    ctx.fillStyle = "#fff"; ctx.font = "bold 10px sans-serif"; ctx.fillText("CHEVALIER", cx - 100, cy - 42);

                    let n = types_personnages.ninja, sn = (perso_choisi === "ninja");
                    ctx.strokeStyle = sn ? "#ffaa00" : "#444"; ctx.fillStyle = n.debloque ? (sn ? "#222a35" : "#222") : "#111";
                    ctx.fillRect(cx - 45, cy - 110, 90, 80); ctx.strokeRect(cx - 45, cy - 110, 90, 80);
                    dessinerHeros("ninja", cx - 15, cy - 105, 30, 30);
                    ctx.fillStyle = n.debloque ? "#fff" : "#ffff00"; ctx.fillText(n.debloque ? "NINJA" : "100 ⛁", cx, cy - 42);

                    let tk = types_personnages.tank, stk = (perso_choisi === "tank");
                    ctx.strokeStyle = stk ? "#ffaa00" : "#444"; ctx.fillStyle = tk.debloque ? (stk ? "#301a35" : "#222") : "#111";
                    ctx.fillRect(cx + 55, cy - 110, 90, 80); ctx.strokeRect(cx + 55, cy - 110, 90, 80);
                    dessinerHeros("tank", cx + 85, cy - 105, 30, 30);
                    ctx.fillStyle = tk.debloque ? "#fff" : "#ffff00"; ctx.fillText(tk.debloque ? "TANK" : "200 ⛁", cx + 100, cy - 42);

                    let h = types_personnages[perso_choisi];
                    ctx.fillStyle = "#ffaa00"; ctx.font = "bold 13px sans-serif"; ctx.fillText("AMÉLIORER : " + h.nom, cx, cy + 15);
                    let c_deg = h.niv_degats * 10, c_vit = h.niv_vitesse * 15;

                    ctx.fillStyle = or_total >= c_deg ? "#1a73e8" : "#333"; ctx.fillRect(cx - 145, cy + 45, 140, 55);
                    ctx.strokeStyle = "#fff"; ctx.strokeRect(cx - 145, cy + 45, 140, 55);
                    ctx.fillStyle = "#fff"; ctx.font = "bold 11px sans-serif"; ctx.fillText("⚔️ DÉGÂTS (Niv." + h.niv_degats + ")", cx - 75, cy + 68);
                    ctx.fillStyle = "#ffff00"; ctx.fillText(c_deg + " ⛁", cx - 75, cy + 88);

                    ctx.fillStyle = or_total >= c_vit ? "#1a73e8" : "#333"; ctx.fillRect(cx + 5, cy + 45, 140, 55);
                    ctx.strokeRect(cx + 5, cy + 45, 140, 55);
                    ctx.fillStyle = "#fff"; ctx.fillText("⚡ VITESSE (Niv." + h.niv_vitesse + ")", cx + 75, cy + 68);
                    ctx.fillStyle = "#ffff00"; ctx.fillText(c_vit + " ⛁", cx + 75, cy + 88);
                }

                // Onglets en bas
                ctx.fillStyle = "#1b1c26"; ctx.fillRect(0, by - 60, canvas.width, 60);
                ctx.strokeStyle = "#2d2f45"; ctx.beginPath(); ctx.moveTo(0, by - 60); ctx.lineTo(canvas.width, by - 60); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(cx, by - 60); ctx.lineTo(cx, by); ctx.stroke();

                if (onglet_actif === "AMELIORATIONS") { ctx.fillStyle = "#2c2e43"; ctx.fillRect(0, by - 59, cx - 1, 58); }
                ctx.fillStyle = onglet_actif === "AMELIORATIONS" ? "#fff" : "#777"; ctx.font = "bold 13px sans-serif"; ctx.fillText("🛠️ AMÉLIORATIONS", cx * 0.5, by - 24);

                if (onglet_actif === "COMBAT") { ctx.fillStyle = "#2c2e43"; ctx.fillRect(cx + 1, by - 59, cx, 58); }
                ctx.fillStyle = onglet_actif === "COMBAT" ? "#fff" : "#777"; ctx.fillText("⚔️ COMBAT", cx * 1.5, by - 24);
                return;
            }

            // --- JEU EN DIRECT ---
            let lc = Math.min(canvas.width, canvas.height) * 0.18;
            ctx.strokeStyle = "#3c3c3c"; ctx.lineWidth = lc; ctx.lineCap = "round";
            ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(canvas.width, canvas.height); ctx.moveTo(canvas.width, 0); ctx.lineTo(0, canvas.height); ctx.stroke();

            liste_ennemis.forEach(e => {
                if (e.type === "kamikaze") {
                    ctx.fillStyle = "#ff6600"; ctx.beginPath(); ctx.arc(e.x + e.largeur/2, e.y + e.hauteur/2, e.largeur/2, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = "#ffff00"; ctx.fillRect(e.x + e.largeur*0.35, e.y - 8, e.largeur*0.3, e.largeur*0.3);
                } else {
                    ctx.fillStyle = "#ff4d4d"; ctx.fillRect(e.x, e.y, e.largeur, e.hauteur);
                    dessinerGrandesCornes(e);
                }
                ctx.fillStyle = "#000"; ctx.fillRect(e.x, e.y - 14, e.largeur, 5);
                ctx.fillStyle = "#ff0000"; ctx.fillRect(e.x, e.y - 14, Math.max(0, (e.hp / e.max_hp) * e.largeur), 5);
            });

            // Coffre
            ctx.fillStyle = "#d4af37"; ctx.fillRect(cx - taille_coffre/2, cy - taille_coffre/2, taille_coffre, taille_coffre);
            ctx.fillStyle = "#555"; ctx.fillRect(cx - 10, cy - 20, 20, 40);

            let lb = Math.min(canvas.width * 0.5, 200);
            ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(cx - lb/2, cy - taille_coffre/2 - 25, lb, 10);
            ctx.fillStyle = "#00ff00"; ctx.fillRect(cx - lb/2, cy - taille_coffre/2 - 25, (hp_coffre/max_hp_coffre)*lb, 10);

            popups_degats.forEach(p => { ctx.fillStyle = "#ff3333"; ctx.font = "bold 15px sans-serif"; ctx.fillText("-" + p.texte, p.x, p.y); });
            ctx.fillStyle = "#333"; ctx.fillRect(0, 0, canvas.width, 6);
            ctx.fillStyle = "#00bfff"; ctx.fillRect(0, 0, (joueur_xp/xp_necessaire)*canvas.width, 6);

            ctx.fillStyle = "#fff"; ctx.font = "bold 15px sans-serif"; ctx.textAlign = "left";
            ctx.fillText("SCORE: " + score, 20, 30); ctx.fillText("OR: +" + or_gagne + "⛁", 20, 52);
            ctx.textAlign = "right"; ctx.fillText("VAGUE: " + vague, canvas.width - 20, 30);

            dessinerHeros(perso_choisi, joueur_x, joueur_y, joueur_largeur, joueur_hauteur);

            if (etat_jeu === "GAMEOVER") {
                ctx.fillStyle = "rgba(0,0,0,0.9)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#ff4d4d"; ctx.font = "bold 25px sans-serif"; ctx.textAlign = "center";
                ctx.fillText("LE COFFRE A ÉTÉ DÉTRUIT !", cx, cy - 100);
                ctx.fillStyle = "#00ff00"; ctx.fillRect(cx - 120, cy + 60, 240, 50);
                ctx.fillStyle = "#000"; ctx.font = "bold 18px sans-serif"; ctx.fillText("RETOUR AU MENU ↻", cx, cy + 92);
            }
        }

        function bouclePrincipale(tempsActuel) {
            let te = tempsActuel - tempsPrecedent; if (te > 250) te = 250;
            tempsPrecedent = tempsActuel; accumulateur += te;
            while (accumulateur >= tickRate) { updatePhysique(); accumulateur -= tickRate; }
            dessiner(); requestAnimationFrame(bouclePrincipale);
        }

        window.onload = function () {
            chargerDonnees(); redimensionner();
            tempsPrecedent = performance.now(); requestAnimationFrame(bouclePrincipale);
        }
    </script>
</body>
</html>
