<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Défends le Coffre !</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #111;
            touch-action: none; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
        }
        /* Zone des boutons */
        .barre-outils {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            gap: 15px;
            z-index: 10;
        }
        .btn {
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            border: 2px solid #555;
            padding: 8px 16px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }
        .btn:hover { background: #444; }
        .btn-rouge { border-color: #ff4d4d; color: #ff4d4d; }
        .btn-rouge:hover { background: #ff4d4d; color: #fff; }
        
        /* Le canvas prend TOUT l'écran réel */
        canvas {
            width: 100vw;
            height: 100vh;
            display: block;
            background-color: #1e1e1e;
        }
    </style>
</head>
<body>

    <div class="barre-outils">
        <button class="btn" onclick="document.documentElement.requestFullscreen()">📺 Plein Écran</button>
        <button class="btn btn-rouge" onclick="window.close(); window.location.href='about:blank';">❌ Quitter</button>
    </div>

    <canvas id="jeuCanvas"></canvas>

    <script>
        const canvas = document.getElementById("jeuCanvas");
        const ctx = canvas.getContext("2d");

        # ÉCRAN TOTAL : On s'adapte à la taille exacte du navigateur
        function redimensionner() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', redimensionner);
        redimensionner();

        // --- VARIABLES ---
        let hp_coffre = 100;
        let argent = 0;
        let vague_actuelle = 1;
        let etat_jeu = "JEU"; 

        // --- PERSO VERT ---
        let joueur_largeur = 70;   
        let joueur_hauteur = 70;   
        let joueur_x = canvas.width / 2 - joueur_largeur / 2;        
        let joueur_y = canvas.height / 2 - joueur_hauteur / 2 + 150; # Pop un peu plus bas que le coffre       
        let joueur_vitesse = 8;   

        let cible_x = joueur_x;
        let cible_y = joueur_y;
        let mode_tactile = false;

        // --- CLAVIER (PC) ---
        let touches = {};
        window.addEventListener("keydown", (e) => {
            touches[e.code] = true;
            mode_tactile = false;
        });
        window.addEventListener("keyup", (e) => touches[e.code] = false);

        // --- TACTILE (TÉLÉPHONE) ---
        function gererAction(clientX, clientY) {
            mode_tactile = true;
            const rect = canvas.getBoundingClientRect();
            cible_x = clientX - joueur_largeur / 2;
            cible_y = clientY - joueur_hauteur / 2;
        }

        canvas.addEventListener("mousedown", (e) => gererAction(e.clientX, e.clientY));
        canvas.addEventListener("touchstart", (e) => gererAction(e.touches[0].clientX, e.touches[0].clientY));
        canvas.addEventListener("touchmove", (e) => {
            e.preventDefault();
            gererAction(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: false });

        // --- BOUCLE DU JEU ---
        function update() {
            if (etat_jeu === "JEU") {
                if (mode_tactile) {
                    let dx = cible_x - joueur_x;
                    let dy = cible_y - joueur_y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance > joueur_vitesse) {
                        joueur_x += (dx / distance) * joueur_vitesse;
                        joueur_y += (dy / distance) * joueur_vitesse;
                    }
                } else {
                    if (touches["ArrowLeft"])  joueur_x -= joueur_vitesse;
                    if (touches["ArrowRight"]) joueur_x += joueur_vitesse;
                    if (touches["ArrowUp"])    joueur_y -= joueur_vitesse;
                    if (touches["ArrowDown"])  joueur_y += joueur_vitesse;
                }
                
                // Murs dynamiques selon la taille de l'écran
                if (joueur_x < 0) joueur_x = 0;
                if (joueur_x > canvas.width - joueur_largeur) joueur_x = canvas.width - joueur_largeur;
                if (joueur_y < 0) joueur_y = 0;
                if (joueur_y > canvas.height - joueur_hauteur) joueur_y = canvas.height - joueur_hauteur;
            }

            dessiner();
            requestAnimationFrame(update);
        }

        function dessiner() {
            // Fond gris foncé
            ctx.fillStyle = "#1e1e1e";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Taille et centre dynamiques
            let centre_x = canvas.width / 2;
            let centre_y = canvas.height / 2;
            let taille_coffre = 150;
            let largeur_chemin = 120;

            if (etat_jeu === "JEU") {
                // --- LES 4 CHEMINS GRIS VERS LE CENTRE ---
                ctx.fillStyle = "#3c3c3c";
                // Chemin Gauche
                ctx.fillRect(0, centre_y - largeur_chemin / 2, centre_x, largeur_chemin);
                // Chemin Droite
                ctx.fillRect(centre_x, centre_y - largeur_chemin / 2, canvas.width - centre_x, largeur_chemin);
                // Chemin Haut
                ctx.fillRect(centre_x - largeur_chemin / 2, 0, largeur_chemin, centre_y);
                // Chemin Bas
                ctx.fillRect(centre_x - largeur_chemin / 2, centre_y, largeur_chemin, canvas.height - centre_y);

                // --- LE COFFRE PILE AU CENTRE (Jaune) ---
                ctx.fillStyle = "#ffff00";
                ctx.fillRect(centre_x - taille_coffre / 2, centre_y - taille_coffre / 2, taille_coffre, taille_coffre);

                // --- TON PERSO (Vert) ---
                ctx.fillStyle = "#00ff00";
                ctx.fillRect(joueur_x, joueur_y, joueur_largeur, joueur_hauteur);
            }
        }

        update();
    </script>
</body>
</html>
