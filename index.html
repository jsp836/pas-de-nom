<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Défends le Coffre ! v3.5</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #111;
            overscroll-behavior: none; 
            touch-action: none; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
            user-select: none;
        }
        
        #ecranDeDemarrage {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(17, 17, 17, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            cursor: pointer;
        }
        .gros-bouton {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 20px 50px;
            font-size: 40px;
            font-weight: bold;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
            cursor: pointer;
        }

        canvas {
            display: block;
            background-color: #1e1e1e;
        }
    </style>
</head>
<body>

    <div id="ecranDeDemarrage" onclick="lancerLeJeu()">
        <button class="gros-bouton">▶ START</button>
    </div>

    <canvas id="jeuCanvas"></canvas>

    <script>
        const canvas = document.getElementById("jeuCanvas");
        const ctx = canvas.getContext("2d");

        let taille_coffre = 100; 
        let joueur_largeur = 50;   
        let joueur_hauteur = 50;   
        let joueur_x = 0;
        let joueur_y = 0;
        let cible_x = 0;
        let cible_y = 0;
        let jeu_actif = false;

        // Gestion du temps
        let tempsPrecedent = performance.now();
        const tickRate = 1000 / 60; 
        let accumulateur = 0;

        // --- BOUTIQUE MUTABLE ---
        let or_total = 0;
        let niveau_degats = 1;
        let niveau_vitesse = 1;

        // --- STATS DE LA PARTIE EN COURS ---
        let hp_coffre = 10000;
        let max_hp_coffre = 10000;
        let etat_jeu = "JEU"; 
        let score = 0;
        let or_gagne = 0;
        let vague = 1;
        let temps_vague_timer = 0;

        // --- SYSTÈME D'XP EN PARTIE ---
        let joueur_niveau = 1;
        let joueur_xp = 0;
        let xp_necessaire = 100;
        let message_level_up = "";
        let level_up_timer = 0;

        // --- EFFETS VISUELS ---
        let popups_degats = [];

        // --- JOUEUR STABILISÉ ---
        let joueur_vitesse_base = 8; 
        let joueur_degats_base = 500;
        let mode_tactile = false;

        // --- ENNEMIS ---
        let liste_ennemis = [];
        let dernier_spawn = 0;
        let intervalle_spawn = 1200; 

        let touches = {};
        window.addEventListener("keydown", (e) => {
            touches[e.code] = true;
            mode_tactile = false;
        });
        window.addEventListener("keyup", (e) => touches[e.code] = false);

        function verifierClicsMenus(x, y) {
            if (etat_jeu !== "GAMEOVER") return false;

            let centre_x = canvas.width / 2;
            let centre_y = canvas.height / 2;

            if (x >= centre_x - 100 && x <= centre_x + 100 && y >= centre_y + 110 && y <= centre_y + 160) {
                recommencerPartie();
                return true;
            }
            let cout_degats = niveau_degats * 10;
            if (x >= centre_x - 160 && x <= centre_x - 10 && y >= centre_y + 20 && y <= centre_y + 70) {
                if (or_total >= cout_degats) {
                    or_total -= cout_degats;
                    niveau_degats++;
                }
                return true;
            }
            let cout_vit = niveau_vitesse * 15;
            if (x >= centre_x + 10 && x <= centre_x + 160 && y >= centre_y + 20 && y <= centre_y + 70) {
                if (or_total >= cout_vit) {
                    or_total -= cout_vit;
                    niveau_vitesse++;
                }
                return true;
            }
            return false;
        }

        function enregistrerPositionDoigt(clientX, clientY) {
            if (!jeu_actif) return;
            if (verifierClicsMenus(clientX, clientY)) return;
            
            if (etat_jeu === "JEU") {
                mode_tactile = true;
                cible_x = clientX - joueur_largeur / 2;
                cible_y = clientY - joueur_hauteur / 2;
            }
        }

        canvas.addEventListener("mousedown", (e) => enregistrerPositionDoigt(e.clientX, e.clientY));
        canvas.addEventListener("touchstart", (e) => {
            if(e.touches.length > 0) enregistrerPositionDoigt(e.touches[0].clientX, e.touches[0].clientY);
        });
        canvas.addEventListener("touchmove", (e) => {
            e.preventDefault(); 
            if(etat_jeu === "JEU" && e.touches.length > 0) {
                cible_x = e.touches[0].clientX - joueur_largeur / 2;
                cible_y = e.touches[0].clientY - joueur_hauteur / 2;
                mode_tactile = true;
            }
        }, { passive: false });

        function redimensionner() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            let plus_petite_dimension = Math.min(canvas.width, canvas.height);
            taille_coffre = plus_petite_dimension * 0.22; 
            joueur_largeur = plus_petite_dimension * 0.1;
            joueur_hauteur = plus_petite_dimension * 0.1;

            if (etat_jeu !== "GAMEOVER") {
                joueur_x = canvas.width / 2 - joueur_largeur / 2;
                joueur_y = canvas.height / 2 - joueur_hauteur / 2 + (taille_coffre * 1.1);
                cible_x = joueur_x;
                cible_y = joueur_y;
            }
        }
        window.addEventListener('resize', redimensionner);
        redimensionner();

        function faireSpawnEnnemis() {
            let coins = [
                {x: 0, y: 0}, {x: canvas.width, y: 0},              
                {x: 0, y: canvas.height}, {x: canvas.width, y: canvas.height}   
            ];
            let e_taille_normal = Math.min(canvas.width, canvas.height) * 0.08;

            coins.forEach((coin) => {
                // Chance d'apparition du Kamikaze (Orange) à partir de la vague 2
                let chanceKamikaze = vague >= 2 ? 0.35 : 0;
                let estKamikaze = Math.random() < chanceKamikaze;

                if (estKamikaze) {
                    liste_ennemis.push({
                        type: "kamikaze",
                        x: coin.x - ((e_taille_normal * 0.7) / 2),
                        y: coin.y - ((e_taille_normal * 0.7) / 2),
                        largeur: e_taille_normal * 0.7, // Plus petit
                        hauteur: e_taille_normal * 0.7,
                        vitesse: (4 + (vague - 1) * 0.4) * 1.6, // Beaucoup plus rapide !
                        hp: (1000 + (vague - 1) * 350) * 0.4,    // Moins de vie
                        max_hp: (1000 + (vague - 1) * 350) * 0.4,
                        degats: (100 + (vague - 1) * 20) * 1.5,  // Fait très mal au coffre
                        couleur: "#ff9900",
                        invulnerable_timer: 0
                    });
                } else {
                    liste_ennemis.push({
                        type: "normal",
                        x: coin.x - (e_taille_normal / 2),
                        y: coin.y - (e_taille_normal / 2),
                        largeur: e_taille_normal,
                        hauteur: e_taille_normal,
                        vitesse: Math.min(7.5, 4 + (vague - 1) * 0.4), 
                        hp: 1000 + (vague - 1) * 350, 
                        max_hp: 1000 + (vague - 1) * 350,
                        degats: 100 + (vague - 1) * 20,
                        couleur: "#ff4d4d",
                        invulnerable_timer: 0
                    });
                }
            });
        }

        function collision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.largeur &&
                   rect1.x + rect1.largeur > rect2.x &&
                   rect1.y < rect2.y + rect2.hauteur &&
                   rect1.y + rect1.hauteur > rect2.y;
        }

        function lancerLeJeu() {
            document.getElementById("ecranDeDemarrage").style.display = "none";
            jeu_actif = true;
            recommencerPartie();
            tempsPrecedent = performance.now();
            requestAnimationFrame(bouclePrincipale);
        }

        function recommencerPartie() {
            hp_coffre = 10000;
            score = 0;
            or_gagne = 0;
            vague = 1;
            temps_vague_timer = 0;
            joueur_niveau = 1;
            joueur_xp = 0;
            xp_necessaire = 100;
            intervalle_spawn = 1200;
            liste_ennemis = [];
            popups_degats = [];
            dernier_spawn = Date.now();
            etat_jeu = "JEU";
            mode_tactile = false;
            redimensionner();
        }

        function bouclePrincipale(tempsActuel) {
            if (!jeu_actif) return;

            let tempsEcoule = tempsActuel - tempsPrecedent;
            tempsPrecedent = tempsActuel;
            if (tempsEcoule > 250) tempsEcoule = 250; 

            accumulateur += tempsEcoule;
            while (accumulateur >= tickRate) {
                updatePhysique();
                accumulateur -= tickRate;
            }

            dessiner();
            requestAnimationFrame(bouclePrincipale);
        }

        function ajouterXP(montant) {
            joueur_xp += montant;
            if (joueur_xp >= xp_necessaire) {
                joueur_xp -= xp_necessaire;
                joueur_niveau++;
                xp_necessaire = Math.floor(xp_necessaire * 1.4);
                
                // Récompense aléatoire de montée de niveau
                let r = Math.random();
                if (r < 0.5) {
                    hp_coffre = Math.min(max_hp_coffre, hp_coffre + 1500);
                    message_level_up = "COFFRE SOIGNÉ ! (+1500 HP)";
                } else {
                    score += 150;
                    message_level_up = "BONUS SCORE ! (+150 PTS)";
                }
                level_up_timer = 90; // Affichage pendant 1.5 seconde
            }
        }

        function updatePhysique() {
            let centre_x = canvas.width / 2;
            let centre_y = canvas.height / 2;

            if (etat_jeu === "JEU") {
                let maintenant = Date.now();
                
                temps_vague_timer += tickRate;
                if (temps_vague_timer >= 20000) {
                    vague++;
                    temps_vague_timer = 0;
                    intervalle_spawn = Math.max(500, 1200 - (vague * 90));
                }

                if (level_up_timer > 0) level_up_timer--;

                // Update popups dégâts
                for (let i = popups_degats.length - 1; i >= 0; i--) {
                    popups_degats[i].y -= 1;
                    popups_degats[i].vie--;
                    if (popups_degats[i].vie <= 0) popups_degats.splice(i, 1);
                }

                if (maintenant - dernier_spawn > intervalle_spawn) {
                    faireSpawnEnnemis();
                    dernier_spawn = maintenant;
                }

                let vitesse_actuelle = joueur_vitesse_base + (niveau_vitesse - 1) * 0.8;
                let degats_actuels = joueur_degats_base + (niveau_degats - 1) * 250;

                // Mouvement joueur
                if (mode_tactile) {
                    let dx = cible_x - joueur_x;
                    let dy = cible_y - joueur_y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance > vitesse_actuelle) {
                        joueur_x += (dx / distance) * vitesse_actuelle;
                        joueur_y += (dy / distance) * vitesse_actuelle;
                    } else {
                        joueur_x = cible_x;
                        joueur_y = cible_y;
                    }
                } else {
                    if (touches["ArrowLeft"])  joueur_x -= vitesse_actuelle;
                    if (touches["ArrowRight"]) joueur_x += vitesse_actuelle;
                    if (touches["ArrowUp"])    joueur_y -= vitesse_actuelle;
                    if (touches["ArrowDown"])  joueur_y += vitesse_actuelle;
                }
                
                if (joueur_x < 0) joueur_x = 0;
                if (joueur_x > canvas.width - joueur_largeur) joueur_x = canvas.width - joueur_largeur;
                if (joueur_y < 0) joueur_y = 0;
                if (joueur_y > canvas.height - joueur_hauteur) joueur_y = canvas.height - joueur_hauteur;

                let rect_coffre = { x: centre_x - taille_coffre / 2, y: centre_y - taille_coffre / 2, largeur: taille_coffre, hauteur: taille_coffre };
                let rect_joueur = { x: joueur_x, y: joueur_y, largeur: joueur_largeur, hauteur: joueur_hauteur };

                for (let i = liste_ennemis.length - 1; i >= 0; i--) {
                    let e = liste_ennemis[i];
                    let cible_ennemi_x = centre_x - e.largeur / 2;
                    let cible_ennemi_y = centre_y - e.hauteur / 2;

                    let dx = cible_ennemi_x - e.x;
                    let dy = cible_ennemi_y - e.y;
                    let dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist > e.vitesse) {
                        e.x += (dx / dist) * e.vitesse;
                        e.y += (dy / dist) * e.vitesse;
                    } else { e.x = cible_ennemi_x; e.y = cible_ennemi_y; }

                    if (e.invulnerable_timer > 0) e.invulnerable_timer--;

                    // Combat Joueur / Ennemi
                    if (collision(rect_joueur, e) && e.invulnerable_timer === 0) {
                        e.hp -= degats_actuels;
                        e.invulnerable_timer = 15; 
                        
                        // Création du texte flottant
                        popups_degats.push({
                            x: e.x + e.largeur / 2 + (Math.random() * 20 - 10),
                            y: e.y,
                            texte: degats_actuels,
                            vie: 30
                        });
                    }

                    // Collision Coffre
                    if (collision(rect_coffre, e)) {
                        hp_coffre -= e.degats;
                        liste_ennemis.splice(i, 1); 
                        continue;
                    }

                    // Mort Ennemi
                    if (e.hp <= 0) {
                        liste_ennemis.splice(i, 1);
                        score += 10;
                        or_gagne += 1;
                        or_total += 1;
                        ajouterXP(e.type === "kamikaze" ? 35 : 20); // Le kamikaze donne plus d'XP
                    }
                }

                if (hp_coffre <= 0) { hp_coffre = 0; etat_jeu = "GAMEOVER"; }
            }
        }

        function dessiner() {
            ctx.fillStyle = "#1e1e1e";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            let centre_x = canvas.width / 2;
            let centre_y = canvas.height / 2;

            // Chemins
            let largeur_chemin = Math.min(canvas.width, canvas.height) * 0.18;
            ctx.strokeStyle = "#3c3c3c";
            ctx.lineWidth = largeur_chemin;
            ctx.lineCap = "round";
            ctx.beginPath();
            ctx.moveTo(0, 0); ctx.lineTo(canvas.width, canvas.height);
            ctx.moveTo(canvas.width, 0); ctx.lineTo(0, canvas.height);
            ctx.stroke();

            // Ennemis
            liste_ennemis.forEach(e => {
                ctx.fillStyle = e.couleur;
                ctx.fillRect(e.x, e.y, e.largeur, e.hauteur);
                ctx.fillStyle = "#000";
                ctx.fillRect(e.x, e.y - 12, e.largeur, 6);
                ctx.fillStyle = "#ff0000";
                let large_vie = (e.hp / e.max_hp) * e.largeur;
                ctx.fillRect(e.x, e.y - 12, large_vie > 0 ? large_vie : 0, 6);
            });

            // Coffre
            ctx.fillStyle = "#ffff00";
            ctx.fillRect(centre_x - taille_coffre / 2, centre_y - taille_coffre / 2, taille_coffre, taille_coffre);

            // Vie Coffre
            let largeur_barre = Math.min(canvas.width * 0.5, 200);
            ctx.fillStyle = "rgba(0,0,0,0.5)";
            ctx.fillRect(centre_x - largeur_barre / 2, centre_y - taille_coffre / 2 - 22, largeur_barre, 10);
            ctx.fillStyle = "#00ff00";
            ctx.fillRect(centre_x - largeur_barre / 2, centre_y - taille_coffre / 2 - 22, (hp_coffre / max_hp_coffre) * largeur_barre, 10);

            // Textes flottants de dégâts
            popups_degats.forEach(p => {
                ctx.fillStyle = "#ff3333";
                ctx.font = "bold 14px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText("-" + p.texte, p.x, p.y);
            });

            // Barre d'XP tout en haut de l'écran
            ctx.fillStyle = "#333";
            ctx.fillRect(0, 0, canvas.width, 6);
            ctx.fillStyle = "#00bfff";
            ctx.fillRect(0, 0, (joueur_xp / xp_necessaire) * canvas.width, 6);

            // HUD
            ctx.fillStyle = "#fff";
            ctx.font = "bold 15px sans-serif";
            ctx.textAlign = "left";
            ctx.fillText("SCORE: " + score, 20, 30);
            ctx.fillText("OR: " + or_total + "⛁", 20, 52);
            ctx.fillText("NIV. " + joueur_niveau, 20, 74);
            ctx.textAlign = "right";
            ctx.fillText("VAGUE: " + vague, canvas.width - 20, 30);

            // Message Level Up temporaire
            if (level_up_timer > 0) {
                ctx.fillStyle = "#00bfff";
                ctx.font = "bold 20px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText("LEVEL UP ! " + message_level_up, centre_x, 40);
            }

            // Joueur
            ctx.fillStyle = "#00ff00";
            ctx.fillRect(joueur_x, joueur_y, joueur_largeur, joueur_hauteur);

            // GAME OVER
            if (etat_jeu === "GAMEOVER") {
                ctx.fillStyle = "rgba(0, 0, 0, 0.9)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = "#ff4d4d";
                ctx.font = "bold 30px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText("LE COFFRE A ÉTÉ DÉTRUIT !", centre_x, centre_y - 120);

                ctx.fillStyle = "#aaa";
                ctx.font = "18px sans-serif";
                ctx.fillText("Score atteint : " + score, centre_x, centre_y - 80);
                ctx.fillStyle = "#ffff00";
                ctx.fillText("Or récolté : +" + or_gagne + " ⛁ (Total : " + or_total + "⛁)", centre_x, centre_y - 50);

                ctx.fillStyle = "#fff";
                ctx.font = "bold 20px sans-serif";
                ctx.fillText("--- MAGASIN ---", centre_x, centre_y - 10);

                let cout_degats = niveau_degats * 10;
                let cout_vit = niveau_vitesse * 15;

                ctx.fillStyle = or_total >= cout_degats ? "#0055ff" : "#333";
                ctx.fillRect(centre_x - 160, centre_y + 20, 150, 50);
                ctx.fillStyle = "#fff";
                ctx.font = "bold 13px sans-serif";
                ctx.fillText("+DÉGÂTS (Niv." + niveau_degats + ")", centre_x - 85, centre_y + 40);
                ctx.fillStyle = "#ffff00";
                ctx.fillText("Coût: " + cout_degats + "⛁", centre_x - 85, centre_y + 60);

                ctx.fillStyle = or_total >= cout_vit ? "#0055ff" : "#333";
                ctx.fillRect(centre_x + 10, centre_y + 20, 150, 50);
                ctx.fillStyle = "#fff";
                ctx.fillText("+VITESSE (Niv." + niveau_vitesse + ")", centre_x + 85, centre_y + 40);
                ctx.fillStyle = "#ffff00";
                ctx.fillText("Coût: " + cout_vit + "⛁", centre_x + 85, centre_y + 60);

                ctx.fillStyle = "#00ff00";
                ctx.fillRect(centre_x - 100, centre_y + 110, 200, 50);
                ctx.fillStyle = "#000";
                ctx.font = "bold 18px sans-serif";
                ctx.fillText("REJOUER ↻", centre_x, centre_y + 140);
            }
        }

        ctx.fillStyle = "#111";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    </script>
</body>
</html>
