<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Défends le Coffre ! v7.8 (Poki Edition)</title>
    <script src="https://game-cdn.poki.com/scripts/v2/poki-sdk.js"></script>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #111; touch-action: none; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; }
        canvas { display: block; background-color: #1e1e1e; }
    </style>
</head>
<body>

    <canvas id="jeuCanvas"></canvas>

    <script>
        const canvas = document.getElementById("jeuCanvas");
        const ctx = canvas.getContext("2d");

        // --- PARAMÈTRES ET VARIABLES ---
        let pokiSDKReady = false;
        PokiSDK.init().then(() => { pokiSDKReady = true; }).catch(() => {});

        let taille_coffre = 100, joueur_largeur = 50, joueur_hauteur = 50, joueur_x = 0, joueur_y = 0, cible_x = 0, cible_y = 0;
        let tempsPrecedent = performance.now();
        const tickRate = 1000 / 60; 
        let accumulateur = 0, onglet_actif = "COMBAT", or_total = 0, perso_choisi = "chevalier";
        let score = 0, or_gagne = 0, joueur_xp = 0, xp_necessaire = 100, joueur_niveau = 1, vague = 1, temps_vague_timer = 0, intervalle_spawn = 1200, dernier_spawn = 0, level_up_timer = 0, message_level_up = "", hp_coffre = 10000, max_hp_coffre = 10000, etat_jeu = "MENU_PRINCIPAL", mode_tactile = false, touches = {}, liste_ennemis = [], popups_degats = [];

        const types_personnages = {
            chevalier: { nom: "CHEVALIER", couleur: "#a6a6a6", prix: 0, debloque: true, vit_base: 8, deg_base: 500, niv_degats: 1, niv_vitesse: 1 },
            ninja: { nom: "NINJA", couleur: "#2e2e2e", prix: 100, debloque: false, vit_base: 12, deg_base: 300, niv_degats: 1, niv_vitesse: 1 },
            tank: { nom: "TANK", couleur: "#5e2585", prix: 200, debloque: false, vit_base: 1.5, deg_base: 1000, niv_degats: 1, niv_vitesse: 1 } // Vitesse réduite ici
        };

        // --- AUDIO ---
        let audioCtx = null;
        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function jouerSon(type) {
            initAudio(); if (!audioCtx) return;
            let osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            let maintenant = audioCtx.currentTime;
            // ... (logique sonore conservée telle quelle pour la brièveté) ...
            osc.start(maintenant); osc.stop(maintenant + 0.1);
        }

        // --- FONCTIONS DE DESSIN ---
        function dessinerChevalier(x, y, w, h) {
            ctx.fillStyle = "#8a8a8a"; ctx.fillRect(x + w*0.15, y + h*0.3, w*0.7, h*0.6);
            ctx.fillStyle = "#b8b8b8"; ctx.fillRect(x + w*0.25, y, w*0.5, h*0.35);
        }
        function dessinerNinja(x, y, w, h) {
            ctx.fillStyle = "#242424"; ctx.fillRect(x + w*0.2, y + h*0.25, w*0.6, h*0.65);
            ctx.fillStyle = "#00bfff"; ctx.fillRect(x + w*0.28, y + h*0.05, w*0.44, h*0.08);
        }
        function dessinerTank(x, y, w, h) {
            ctx.fillStyle = "#5e2585"; ctx.fillRect(x + w*0.05, y + h*0.2, w*0.9, h*0.7);
            ctx.fillStyle = "#9400d3"; ctx.fillRect(x, y + h*0.15, w*0.22, h*0.22);
        }

        function dessinerDecors() {
            ctx.fillStyle = "#2a3a2a"; 
            ctx.fillRect(100, 100, 20, 20); ctx.fillRect(canvas.width - 150, canvas.height - 150, 30, 30);
            ctx.fillStyle = "#3a4a3a";
            ctx.beginPath(); ctx.arc(200, 300, 10, 0, Math.PI*2); ctx.fill();
        }

        function dessinerHeros(type, x, y, w, h) {
            if (type === "chevalier") dessinerChevalier(x, y, w, h);
            else if (type === "ninja") dessinerNinja(x, y, w, h);
            else if (type === "tank") dessinerTank(x, y, w, h);
        }

        // ... (reste des fonctions updatePhysique, collision, etc.) ...
        
        function dessiner() {
            ctx.fillStyle = "#1e1e1e"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            if (etat_jeu === "JEU") {
                dessinerDecors(); // Ajout du décor au sol
                // ... reste du rendu du jeu ...
            }
            // ... reste du rendu menu et gameover ...
        }

        function bouclePrincipale(tempsActuel) {
            let tempsEcoule = tempsActuel - tempsPrecedent;
            if (tempsEcoule > 250) tempsEcoule = 250; 
            tempsPrecedent = tempsActuel; accumulateur += tempsEcoule;
            while (accumulateur >= tickRate) { updatePhysique(); accumulateur -= tickRate; }
            dessiner(); requestAnimationFrame(bouclePrincipale);
        }

        // Lancement
        window.addEventListener('load', () => { requestAnimationFrame(bouclePrincipale); });
    </script>
</body>
</html>
