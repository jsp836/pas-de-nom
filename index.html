<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Défends le Coffre !</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #111;
            touch-action: none; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
        }
        .barre-outils {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            gap: 15px;
            z-index: 10;
        }
        .btn {
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            border: 2px solid #555;
            padding: 8px 16px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }
        .btn:hover { background: #444; }
        .btn-rouge { border-color: #ff4d4d; color: #ff4d4d; }
        .btn-rouge:hover { background: #ff4d4d; color: #fff; }
        
        canvas {
            width: 100vw;
            height: 100vh;
            display: block;
            background-color: #1e1e1e;
        }
    </style>
</head>
<body>

    <div class="barre-outils">
        <button class="btn" onclick="document.documentElement.requestFullscreen()">📺 Plein Écran</button>
        <button class="btn btn-rouge" onclick="window.close(); window.location.href='about:blank';">❌ Quitter</button>
    </div>

    <canvas id="jeuCanvas"></canvas>

    <script>
        window.addEventListener("DOMContentLoaded", function() {
            const canvas = document.getElementById("jeuCanvas");
            const ctx = canvas.getContext("2d");

            function redimensionner() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            redimensionner();
            window.addEventListener('resize', redimensionner);

            // --- STATS ---
            let hp_coffre = 10000;
            let max_hp_coffre = 10000;
            let etat_jeu = "JEU"; 

            // --- JOUEUR VERT ---
            let joueur_largeur = 70;   
            let joueur_hauteur = 70;   
            let joueur_x = window.innerWidth / 2 - joueur_largeur / 2;        
            let joueur_y = window.innerHeight / 2 - joueur_hauteur / 2 + 180;       
            let joueur_vitesse = 4; 
            let joueur_degats = 500;

            let cible_x = joueur_x;
            let cible_y = joueur_y;
            let mode_tactile = false;

            // --- ENNEMIS ---
            let liste_ennemis = [];
            let dernier_spawn = 0;
            let compteurs_coins = [0, 0, 0, 0]; 

            let touches = {};
            window.addEventListener("keydown", (e) => {
                touches[e.code] = true;
                mode_tactile = false;
            });
            window.addEventListener("keyup", (e) => touches[e.code] = false);

            function gererAction(clientX, clientY) {
                mode_tactile = true;
                cible_x = clientX - joueur_largeur / 2;
                cible_y = clientY - joueur_hauteur / 2;
            }

            canvas.addEventListener("mousedown", (e) => gererAction(e.clientX, e.clientY));
            canvas.addEventListener("touchstart", (e) => {
                if(e.touches.length > 0) {
                    gererAction(e.touches[0].clientX, e.touches[0].clientY);
                }
            });
            canvas.addEventListener("touchmove", (e) => {
                e.preventDefault();
                if(e.touches.length > 0) {
                    gererAction(e.touches[0].clientX, e.touches[0].clientY);
                }
            }, { passive: false });

            function faireSpawnEnnemis() {
                let coins = [
                    {x: 0, y: 0},                         
                    {x: canvas.width, y: 0},              
                    {x: 0, y: canvas.height},             
                    {x: canvas.width, y: canvas.height}   
                ];

                coins.forEach((coin, index) => {
                    if (compteurs_coins[index] < 10) {
                        liste_ennemis.push({
                            x: coin.
