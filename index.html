<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Défends le Coffre ! v7.9</title>
    <!-- Chargement officiel du kit de developpement Poki -->
    <script src="https://game-cdn.poki.com/scripts/v2/poki-sdk.js"></script>
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background-color: #0f1a0f; touch-action: none; display: flex; 
            align-items: center; justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none;
        }
        canvas { display: block; background-color: #2d4a2d; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <canvas id="jeuCanvas"></canvas>
    <script>
        const canvas = document.getElementById("jeuCanvas");
        const ctx = canvas.getContext("2d");

        let pokiSDKReady = false;
        PokiSDK.init().then(() => { pokiSDKReady = true; }).catch(() => {});

        let taille_coffre = 100; let joueur_largeur = 50; let joueur_hauteur = 50;
        let joueur_x = 0; let joueur_y = 0; let cible_x = 0; let cible_y = 0;
        let tempsPrecedent = performance.now(); const tickRate = 1000 / 60; let accumulateur = 0;
        let onglet_actif = "COMBAT"; let or_total = 0; let perso_choisi = "chevalier";

        const types_personnages = {
            chevalier: { nom: "CHEVALIER", couleur: "#a6a6a6", prix: 0, debloque: true, vit_base: 8, deg_base: 500, niv_degats: 1, niv_vitesse: 1 },
            ninja: { nom: "NINJA", couleur: "#2e2e2e", prix: 100, debloque: false, vit_base: 12, deg_base: 300, niv_degats: 1, niv_vitesse: 1 },
            tank: { nom: "TANK", couleur: "#5e2585", prix: 200, debloque: false, vit_base: 3, deg_base: 1000, niv_degats: 1, niv_vitesse: 1 }
        };

        let decor = [];
        function rafraichirDecor() {
            decor = [];
            let lChemin = Math.min(canvas.width, canvas.height) * 0.15 / 2;
            for(let i=0; i<120; i++){
                let x = Math.random() * canvas.width;
                let y = Math.random() * canvas.height;
                if(Math.hypot(x - canvas.width/2, y - canvas.height/2) < taille_coffre * 0.7) continue;
                if(Math.abs(x - canvas.width/2) < lChemin || Math.abs(y - canvas.height/2) < lChemin) continue;
                decor.push({x, y, s: 2 + Math.random() * 4, type: Math.random() > 0.5 ? 'rond' : 'carre'});
            }
        }

        let audioCtx = null;
        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function jouerSon(type) {
            initAudio(); if (!audioCtx) return;
            let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            let maintenant = audioCtx.currentTime;
            if (type === "clic") { osc.frequency.setValueAtTime(400, maintenant); osc.frequency.exponentialRampToValueAtTime(800, maintenant + 0.05); gain.gain.setValueAtTime(0.05, maintenant); gain.gain.linearRampToValueAtTime(0, maintenant + 0.05); osc.start(); osc.stop(maintenant + 0.05); }
            else if (type === "hit") { osc.type = perso_choisi === "chevalier" ? "sine" : "sawtooth"; osc.frequency.setValueAtTime(600, maintenant); gain.gain.linearRampToValueAtTime(0, maintenant + 0.1); osc.start(); osc.stop(maintenant + 0.1); }
            else if (type === "morsure") { osc.type = "triangle"; osc.frequency.setValueAtTime(150, maintenant); gain.gain.linearRampToValueAtTime(0, maintenant + 0.08); osc.start(); osc.stop(maintenant + 0.08); }
            else if (type === "explosion") { osc.type = "sawtooth"; osc.frequency.setValueAtTime(100, maintenant); gain.gain.linearRampToValueAtTime(0, maintenant + 0.3); osc.start(); osc.stop(maintenant + 0.3); }
            else if (type === "levelup") { osc.type = "sine"; osc.frequency.setValueAtTime(300, maintenant); osc.frequency.setValueAtTime(600, maintenant + 0.3); gain.gain.linearRampToValueAtTime(0, maintenant + 0.4); osc.start(); osc.stop(maintenant + 0.4); }
        }

        function dessinerChevalier(x, y, w, h) { ctx.fillStyle = "#8a8a8a"; ctx.fillRect(x + w*0.15, y + h*0.3, w*0.7, h*0.6); ctx.fillStyle = "#b8b8b8"; ctx.fillRect(x + w*0.25, y, w*0.5, h*0.35); }
        function dessinerNinja(x, y, w, h) { ctx.fillStyle = "#242424"; ctx.fillRect(x + w*0.2, y + h*0.25, w*0.6, h*0.65); ctx.fillStyle = "#00bfff"; ctx.fillRect(x + w*0.28, y + h*0.05, w*0.44, h*0.08); }
        function dessinerTank(x, y, w, h) { ctx.fillStyle = "#5e2585"; ctx.fillRect(x + w*0.05, y + h*0.2, w*0.9, h*0.7); ctx.fillStyle = "#9400d3"; ctx.fillRect(x, y + h*0.15, w*0.22, h*0.22); ctx.fillRect(x + w*0.78, y + h*0.15, w*0.22, h*0.22); }
        function dessinerHeros(type, x, y, w, h) { if (type === "chevalier") dessinerChevalier(x, y, w, h); else if (type === "ninja") dessinerNinja(x, y, w, h); else if (type === "tank") dessinerTank(x, y, w, h); }

        function sauvegarderDonnees() {
            localStorage.setItem("defends_le_coffre_sauvegarde", JSON.stringify({ or_total, perso_choisi, ninja_debloque: types_personnages.ninja.debloque, tank_debloque: types_personnages.tank.debloque }));
        }

        function chargerDonnees() {
            const sauvegarde = localStorage.getItem("defends_le_coffre_sauvegarde");
            if (sauvegarde) { const d = JSON.parse(sauvegarde); or_total = d.or_total ?? 0; perso_choisi = d.perso_choisi ?? "chevalier"; types_personnages.ninja.debloque = d.ninja_debloque ?? false; types_personnages.tank.debloque = d.tank_debloque ?? false; }
        }

        let hp_coffre = 10000; let max_hp_coffre = 10000; let etat_jeu = "MENU_PRINCIPAL"; let score = 0; let vague = 1;
        let liste_ennemis = []; let dernier_spawn = 0; let intervalle_spawn = 1200; let touches = {};

        window.addEventListener("keydown", (e) => { touches[e.code] = true; });
        window.addEventListener("keyup", (e) => { touches[e.code] = false; });

        function redimensionner() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            let tMin = Math.min(canvas.width, canvas.height);
            taille_coffre = tMin * 0.2; joueur_largeur = tMin * 0.1; joueur_hauteur = tMin * 0.1;
            rafraichirDecor();
        }
        window.addEventListener('resize', redimensionner);
        redimensionner();

        function dessinerChemin() {
            let l = Math.min(canvas.width, canvas.height) * 0.15;
            ctx.fillStyle = "#5c4033"; 
            ctx.fillRect(canvas.width/2 - l/2, 0, l, canvas.height);
            ctx.fillRect(0, canvas.height/2 - l/2, canvas.width, l);
        }

        function updatePhysique() {
            if (etat_jeu === "JEU") {
                let p = types_personnages[perso_choisi];
                let vit = p.vit_base;
                if (touches["ArrowLeft"]) joueur_x -= vit;
                if (touches["ArrowRight"]) joueur_x += vit;
                if (touches["ArrowUp"]) joueur_y -= vit;
                if (touches["ArrowDown"]) joueur_y += vit;
                joueur_x = Math.max(0, Math.min(canvas.width - joueur_largeur, joueur_x));
                joueur_y = Math.max(0, Math.min(canvas.height - joueur_hauteur, joueur_y));
            }
        }

        function dessiner() {
            ctx.fillStyle = "#2d4a2d"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            decor.forEach(d => { ctx.fillStyle = "rgba(30, 80, 30, 0.4)"; if(d.type === 'rond') { ctx.beginPath(); ctx.arc(d.x, d.y, d.s, 0, Math.PI*2); ctx.fill(); } else { ctx.fillRect(d.x, d.y, d.s, d.s); } });
            
            dessinerChemin();
            
            ctx.fillStyle = "#FFD700";
            ctx.fillRect(canvas.width/2 - 30, canvas.height/2 - 30, 60, 60);

            liste_ennemis.forEach(m => {
                ctx.fillStyle = "#FF4444";
                ctx.fillRect(m.x, m.y, 30, 30);
            });

            if (etat_jeu === "MENU_PRINCIPAL") {
                ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(0,0,canvas.width, canvas.height);
                ctx.fillStyle = "#fff"; ctx.font = "40px Arial"; ctx.textAlign = "center";
                ctx.fillText("DÉFENDS LE COFFRE !", canvas.width/2, canvas.height/2 - 50);
                ctx.fillText("CLIQUE POUR JOUER", canvas.width/2, canvas.height/2 + 50);
            }

            dessinerHeros(perso_choisi, joueur_x, joueur_y, joueur_largeur, joueur_hauteur);
            requestAnimationFrame(dessiner);
        }

        canvas.addEventListener("mousedown", () => {
            if (etat_jeu === "MENU_PRINCIPAL") { etat_jeu = "JEU"; }
        });

        window.onload = () => {
            PokiSDK.gameLoadingFinished();
            dessiner();
            setInterval(updatePhysique, 1000/60);
        };
    </script>
</body>
</html>
