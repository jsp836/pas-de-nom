<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Défends le Coffre ! v7.9 (Poki Edition)</title>
    <!-- Chargement officiel du kit de developpement Poki -->
    <script src="https://game-cdn.poki.com/scripts/v2/poki-sdk.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0f1a0f;
            touch-action: none; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
            background-color: #2d4a2d;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <canvas id="jeuCanvas"></canvas>

    <script>
        const canvas = document.getElementById("jeuCanvas");
        const ctx = canvas.getContext("2d");

        let pokiSDKReady = false;

        // Initialisation de l'API Poki
        PokiSDK.init().then(() => {
            pokiSDKReady = true;
            console.log("Poki SDK initialisé avec succès !");
        }).catch(() => {
            console.log("Erreur d'initialisation Poki, lancement du jeu classique.");
        });

        let taille_coffre = 100; 
        let joueur_largeur = 50;   
        let joueur_hauteur = 50;   
        let joueur_x = 0;
        let joueur_y = 0;
        let cible_x = 0;
        let cible_y = 0;

        let tempsPrecedent = performance.now();
        const tickRate = 1000 / 60; 
        let accumulateur = 0;

        let onglet_actif = "COMBAT"; 
        let or_total = 0;

        let perso_choisi = "chevalier";
        const types_personnages = {
            chevalier: { 
                nom: "CHEVALIER", couleur: "#a6a6a6", prix: 0, debloque: true,
                vit_base: 8, deg_base: 500, niv_degats: 1, niv_vitesse: 1 
            },
            ninja: { 
                nom: "NINJA", couleur: "#2e2e2e", prix: 100, debloque: false,
                vit_base: 12, deg_base: 300, niv_degats: 1, niv_vitesse: 1 
            },
            tank: { 
                nom: "TANK", couleur: "#5e2585", prix: 200, debloque: false,
                vit_base: 3, deg_base: 1000, niv_degats: 1, niv_vitesse: 1 
            }
        };

        let decor = [];
        function rafraichirDecor() {
            decor = [];
            let lChemin = Math.min(canvas.width, canvas.height) * 0.18 / 2;
            for(let i=0; i<150; i++){
                let x = Math.random() * canvas.width;
                let y = Math.random() * canvas.height;
                // Vérifier si sur le coffre
                if(Math.hypot(x - canvas.width/2, y - canvas.height/2) < taille_coffre * 0.7) continue;
                // Vérifier si sur les chemins droits
                if(Math.abs(x - canvas.width/2) < lChemin || Math.abs(y - canvas.height/2) < lChemin) continue;
                decor.push({x, y, s: 2 + Math.random() * 4, type: Math.random() > 0.5 ? 'rond' : 'carre'});
            }
        }

        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function jouerSon(type) {
            initAudio();
            if (!audioCtx) return;
            
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            let maintenant = audioCtx.currentTime;

            if (type === "clic") {
                osc.type = "sine";
                osc.frequency.setValueAtTime(400, maintenant);
                osc.frequency.exponentialRampToValueAtTime(800, maintenant + 0.05);
                gain.gain.setValueAtTime(0.05, maintenant);
                gain.gain.linearRampToValueAtTime(0, maintenant + 0.05);
                osc.start(maintenant); osc.stop(maintenant + 0.05);
            } 
            else if (type === "hit") {
                if (perso_choisi === "chevalier") {
                    osc.type = "sine";
                    osc.frequency.setValueAtTime(600, maintenant);
                    osc.frequency.exponentialRampToValueAtTime(150, maintenant + 0.08);
                    gain.gain.setValueAtTime(0.1, maintenant);
                } else if (perso_choisi === "ninja") {
                    osc.type = "triangle";
                    osc.frequency.setValueAtTime(800, maintenant);
                    osc.frequency.exponentialRampToValueAtTime(300, maintenant + 0.05);
                    gain.gain.setValueAtTime(0.08, maintenant);
                } else {
                    osc.type = "sawtooth";
                    osc.frequency.setValueAtTime(120, maintenant);
                    osc.frequency.linearRampToValueAtTime(30, maintenant + 0.15);
                    gain.gain.setValueAtTime(0.2, maintenant);
                }
                gain.gain.linearRampToValueAtTime(0, maintenant + 0.1);
                osc.start(maintenant); osc.stop(maintenant + 0.15);
            } 
            else if (type === "morsure") {
                osc.type = "triangle";
                osc.frequency.setValueAtTime(150, maintenant);
                osc.frequency.linearRampToValueAtTime(40, maintenant + 0.08);
                gain.gain.setValueAtTime(0.15, maintenant);
                gain.gain.linearRampToValueAtTime(0, maintenant + 0.08);
                osc.start(maintenant); osc.stop(maintenant + 0.08);
            }
            else if (type === "explosion") {
                osc.type = "sawtooth";
                osc.frequency.setValueAtTime(100, maintenant);
                osc.frequency.linearRampToValueAtTime(20, maintenant + 0.3);
                gain.gain.setValueAtTime(0.2, maintenant);
                gain.gain.linearRampToValueAtTime(0, maintenant + 0.3);
                osc.start(maintenant); osc.stop(maintenant + 0.3);
            } 
            else if (type === "levelup") {
                osc.type = "sine";
                osc.frequency.setValueAtTime(300, maintenant);
                osc.frequency.setValueAtTime(450, maintenant + 0.15);
                osc.frequency.setValueAtTime(600, maintenant + 0.3);
                gain.gain.setValueAtTime(0.1, maintenant);
                gain.gain.linearRampToValueAtTime(0, maintenant + 0.4);
                osc.start(maintenant); osc.stop(maintenant + 0.4);
            }
        }

        function dessinerChevalier(x, y, w, h) {
            ctx.fillStyle = "#8a8a8a"; ctx.fillRect(x + w*0.15, y + h*0.3, w*0.7, h*0.6);
            ctx.fillStyle = "#6b6b6b"; ctx.fillRect(x + w*0.15, y + h*0.6, w*0.7, h*0.3);
            ctx.fillStyle = "#4a4a4a"; ctx.fillRect(x + w*0.2, y + h*0.9, w*0.2, h*0.1); ctx.fillRect(x + w*0.6, y + h*0.9, w*0.2, h*0.1);
            ctx.fillStyle = "#b8b8b8"; ctx.fillRect(x + w*0.25, y, w*0.5, h*0.35);
            ctx.fillStyle = "#3a3a3a"; ctx.fillRect(x + w*0.3, y + h*0.12, w*0.4, h*0.1);
            ctx.fillStyle = "#ffcc00"; ctx.fillRect(x + w*0.45, y + h*0.12, w*0.1, h*0.1);
            ctx.fillStyle = "#d4d4d4"; ctx.fillRect(x + w*0.8, y + h*0.2, w*0.1, h*0.5);
            ctx.fillStyle = "#8c5311"; ctx.fillRect(x + w*0.75, y + h*0.6, w*0.2, h*0.06);
        }

        function dessinerNinja(x, y, w, h) {
            ctx.fillStyle = "#242424"; ctx.fillRect(x + w*0.2, y + h*0.25, w*0.6, h*0.65);
            ctx.fillStyle = "#141414"; ctx.fillRect(x + w*0.25, y + h*0.9, w*0.18, h*0.1); ctx.fillRect(x + w*0.57, y + h*0.9, w*0.18, h*0.1);
            ctx.fillStyle = "#1e1e1e"; ctx.fillRect(x + w*0.28, y, w*0.44, h*0.3);
            ctx.fillStyle = "#00bfff"; ctx.fillRect(x + w*0.28, y + h*0.05, w*0.44, h*0.08);
            ctx.fillStyle = "#ffebad"; ctx.fillRect(x + w*0.35, y + h*0.15, w*0.3, h*0.08);
            ctx.fillStyle = "#ff0000"; ctx.fillRect(x + w*0.4, y + h*0.16, w*0.05, h*0.05); ctx.fillRect(x + w*0.55, y + h*0.16, w*0.05, h*0.05);
            ctx.fillStyle = "#ff2424"; ctx.fillRect(x + w*0.1, y + h*0.3, w*0.15, h*0.3);
        }

        function dessinerTank(x, y, w, h) {
            ctx.fillStyle = "#5e2585"; ctx.fillRect(x + w*0.05, y + h*0.2, w*0.9, h*0.7);
            ctx.fillStyle = "#3d1459"; ctx.fillRect(x + w*0.05, y + h*0.6, w*0.9, h*0.3);
            ctx.fillStyle = "#9400d3"; ctx.fillRect(x, y + h*0.15, w*0.22, h*0.22); ctx.fillRect(x + w*0.78, y + h*0.15, w*0.22, h*0.22);
            ctx.fillStyle = "#222"; ctx.fillRect(x + w*0.15, y + h*0.9, w*0.25, h*0.1); ctx.fillRect(x + w*0.6, y + h*0.9, w*0.25, h*0.1);
            ctx.fillStyle = "#42324d"; ctx.fillRect(x + w*0.3, y - h*0.05, w*0.4, h*0.3);
            ctx.fillStyle = "#d4d4d4"; ctx.fillRect(x + w*0.38, y + h*0.05, w*0.24, h*0.15);
            ctx.fillStyle = "#111"; ctx.fillRect(x + w*0.42, y + h*0.08, w*0.03, h*0.1); ctx.fillRect(x + w*0.49, y + h*0.08, w*0.03, h*0.1); ctx.fillRect(x + w*0.55, y + h*0.08, w*0.03, h*0.1);
        }

        function dessinerHeros(type, x, y, w, h) {
            if (type === "chevalier") dessinerChevalier(x, y, w, h);
            else if (type === "ninja") dessinerNinja(x, y, w, h);
            else if (type === "tank") dessinerTank(x, y, w, h);
        }

        function dessinerGrandesCornes(e) {
            ctx.fillStyle = "#111111"; 
            let ep = Math.max(3, e.largeur * 0.08);
            ctx.fillRect(e.x - ep, e.y + 2, ep, ep); ctx.fillRect(e.x - ep*2, e.y, ep, ep);
            ctx.fillRect(e.x - ep*2, e.y - ep, ep, ep); ctx.fillRect(e.x - ep, e.y - ep*2, ep, ep);
            ctx.fillRect(e.x + e.largeur, e.y + 2, ep, ep); ctx.fillRect(e.x + e.largeur + ep, e.y, ep, ep);
            ctx.fillRect(e.x + e.largeur + ep, e.y - ep, ep, ep); ctx.fillRect(e.x + e.largeur, e.y - ep*2, ep, ep);
        }

        function sauvegarderDonnees() {
            const d = {
                or_total: or_total, perso_choisi: perso_choisi,
                ninja_debloque: types_personnages.ninja.debloque, tank_debloque: types_personnages.tank.debloque,
                chevalier_deg: types_personnages.chevalier.niv_degats, chevalier_vit: types_personnages.chevalier.niv_vitesse,
                ninja_deg: types_personnages.ninja.niv_degats, ninja_vit: types_personnages.ninja.niv_vitesse,
                tank_deg: types_personnages.tank.niv_degats, tank_vit: types_personnages.tank.niv_vitesse
            };
            localStorage.setItem("defends_le_coffre_sauvegarde", JSON.stringify(d));
        }

        function chargerDonnees() {
            const sauvegarde = localStorage.getItem("defends_le_coffre_sauvegarde");
            if (sauvegarde) {
                try {
                    const d = JSON.parse(sauvegarde);
                    or_total = d.or_total ?? 0;
                    perso_choisi = d.perso_choisi ?? "chevalier";
                    types_personnages.ninja.debloque = d.ninja_debloque ?? false;
                    types_personnages.tank.debloque = d.tank_debloque ?? false;
                    types_personnages.chevalier.niv_degats = d.chevalier_deg ?? 1;
                    types_personnages.chevalier.niv_vitesse = d.chevalier_vit ?? 1;
                    types_personnages.ninja.niv_degats = d.ninja_deg ?? 1;
                    types_personnages.ninja.niv_vitesse = d.ninja_vit ?? 1;
                    types_personnages.tank.niv_degats = d.tank_deg ?? 1;
                    types_personnages.tank.niv_vitesse = d.tank_vit ?? 1;
                } catch (e) { console.error(e); }
            }
        }

        let hp_coffre = 10000;
        let max_hp_coffre = 10000;
        let etat_jeu = "MENU_PRINCIPAL"; 
        let score = 0;
        let or_gagne = 0;
        let vague = 1;
        let temps_vague_timer = 0;

        let joueur_niveau = 1;
        let joueur_xp = 0;
        let xp_necessaire = 100;
        let message_level_up = "";
        let level_up_timer = 0;
        let popups_degats = [];

        let liste_ennemis = [];
        let dernier_spawn = 0;
        let intervalle_spawn = 1200; 
        let mode_tactile = false;
        let touches = {};

        window.addEventListener("keydown", (e) => { touches[e.code] = true; mode_tactile = false; });
        window.addEventListener("keyup", (e) => touches[e.code] = false);

        function togglePleinEcran() {
            try {
                if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                    let el = document.documentElement;
                    if (el.requestFullscreen) el.requestFullscreen();
                    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
                } else {
                    if (document.exitFullscreen) document.exitFullscreen();
                    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                }
            } catch (e) { console.error(e); }
        }

        function verifierClicsMenus(x, y) {
            let centre_x = canvas.width / 2;
            let centre_y = canvas.height / 2;
            let bas_y = canvas.height;

            if (etat_jeu === "MENU_PRINCIPAL") {
                if (x >= 20 && x <= 160 && y >= 25 && y <= 65) {
                    jouerSon("clic");
                    togglePleinEcran();
                    return true;
                }

                if (y >= bas_y - 60 && y <= bas_y) {
                    jouerSon("clic");
                    if (x >= 0 && x < canvas.width / 2) { onglet_actif = "AMELIORATIONS"; } 
                    else { onglet_actif = "COMBAT"; }
                    return true;
                }

                if (onglet_actif === "COMBAT") {
                    if (x >= centre_x - 110 && x <= centre_x + 110 && y >= centre_y + 10 && y <= centre_y + 75) {
                        jouerSon("clic");
                        demarrerLaVraiePartie();
                        return true;
                    }
                }

                if (onglet_actif === "AMELIORATIONS") {
                    if (x >= centre_x - 145 && x <= centre_x - 55 && y >= centre_y - 110 && y <= centre_y - 30) {
                        jouerSon("clic"); perso_choisi = "chevalier"; sauvegarderDonnees(); return true;
                    }
                    if (x >= centre_x - 45 && x <= centre_x + 45 && y >= centre_y - 110 && y <= centre_y - 30) {
                        let n = types_personnages.ninja;
                        if (n.debloque) { jouerSon("clic"); perso_choisi = "ninja"; } 
                        else if (or_total >= n.prix) { jouerSon("levelup"); or_total -= n.prix; n.debloque = true; perso_choisi = "ninja"; }
                        sauvegarderDonnees(); return true;
                    }
                    if (x >= centre_x + 55 && x <= centre_x + 145 && y >= centre_y - 110 && y <= centre_y - 30) {
                        let t = types_personnages.tank;
                        if (t.debloque) { jouerSon("clic"); perso_choisi = "tank"; } 
                        else if (or_total >= t.prix) { jouerSon("levelup"); or_total -= t.prix; t.debloque = true; perso_choisi = "tank"; }
                        sauvegarderDonnees(); return true;
                    }

                    let heros = types_personnages[perso_choisi];
                    let c_deg = heros.niv_degats * 10;
                    let c_vit = heros.niv_vitesse * 15;

                    if (x >= centre_x - 145 && x <= centre_x - 5 && y >= centre_y + 45 && y <= centre_y + 100) {
                        if (or_total >= c_deg) { jouerSon("levelup"); or_total -= c_deg; heros.niv_degats++; sauvegarderDonnees(); }
                        return true;
                    }
                    if (x >= centre_x + 5 && x <= centre_x + 145 && y >= centre_y + 45 && y <= centre_y + 100) {
                        if (or_total >= c_vit) { jouerSon("levelup"); or_total -= c_vit; heros.niv_vitesse++; sauvegarderDonnees(); }
                        return true;
                    }
                }
            }

            if (etat_jeu === "GAMEOVER") {
                if (x >= centre_x - 120 && x <= centre_x + 120 && y >= centre_y + 60 && y <= centre_y + 110) {
                    jouerSon("clic"); etat_jeu = "MENU_PRINCIPAL"; onglet_actif = "COMBAT"; sauvegarderDonnees(); return true;
                }
            }
            return false;
        }

        function goulotDoigt(clientX, clientY) {
            if (verifierClicsMenus(clientX, clientY)) return;
            if (etat_jeu === "JEU") {
                mode_tactile = true;
                cible_x = clientX - joueur_largeur / 2;
                cible_y = clientY - joueur_hauteur / 2;
            }
        }

        canvas.addEventListener("mousedown", (e) => goulotDoigt(e.clientX, e.clientY));
        canvas.addEventListener("touchstart", (e) => {
            if(e.touches.length > 0) goulotDoigt(e.touches[0].clientX, e.touches[0].clientY);
        });
        canvas.addEventListener("touchmove", (e) => {
            e.preventDefault(); 
            if(etat_jeu === "JEU" && e.touches.length > 0) {
                cible_x = e.touches[0].clientX - joueur_largeur / 2;
                cible_y = e.touches[0].clientY - joueur_hauteur / 2;
                mode_tactile = true;
            }
        }, { passive: false });

        function redimensionner() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            let tailleMin = Math.min(canvas.width, canvas.height);
            taille_coffre = tailleMin * 0.22; joueur_largeur = tailleMin * 0.11; joueur_hauteur = tailleMin * 0.11;

            rafraichirDecor();

            if (etat_jeu === "JEU") {
                joueur_x = canvas.width / 2 - joueur_largeur / 2;
                joueur_y = canvas.height / 2 - joueur_hauteur / 2 + (taille_coffre * 1.1);
                cible_x = joueur_x; cible_y = joueur_y;
            }
        }
        window.addEventListener('resize', redimensionner);

        function demarrerLaVraiePartie() {
            PokiSDK.commercialBreak().then(() => {
                PokiSDK.gameplayStart();
                hp_coffre = 10000; score = 0; or_gagne = 0; vague = 1; temps_vague_timer = 0;
                joueur_niveau = 1; joueur_xp = 0; xp_necessaire = 100; intervalle_spawn = 1200;
                liste_ennemis = []; popups_degats = []; dernier_spawn = Date.now();
                mode_tactile = false; etat_jeu = "JEU"; redimensionner();
            });
        }

        function faireSpawnEnnemis() {
            let coins = [{x: 0, y: 0}, {x: canvas.width, y: 0}, {x: 0, y: canvas.height}, {x: canvas.width, y: canvas.height}];
            let tEnnemi = Math.min(canvas.width, canvas.height) * 0.082;

            coins.forEach((coin) => {
                let estKamikaze = vague >= 2 && Math.random() < 0.35;
                if (estKamikaze) {
                    liste_ennemis.push({
                        type: "kamikaze", x: coin.x - (tEnnemi*0.75/2), y: coin.y - (tEnnemi*0.75/2),
                        largeur: tEnnemi * 0.75, hauteur: tEnnemi * 0.75, vitesse: (4 + (vague - 1) * 0.4) * 1.5,
                        hp: (1000 + (vague - 1) * 350) * 0.4, max_hp: (1000 + (vague - 1) * 350) * 0.4,
                        degats: (100 + (vague - 1) * 20) * 1.5, couleur: "#ff9900", invulnerable_timer: 0
                    });
                } else {
                    liste_ennemis.push({
                        type: "normal", x: coin.x - (tEnnemi/2), y: coin.y - (tEnnemi/2),
                        largeur: tEnnemi, hauteur: tEnnemi, vitesse: Math.min(7.5, 4 + (vague - 1) * 0.4), 
                        hp: 1000 + (vague - 1) * 350, max_hp: 1000 + (vague - 1) * 350,
                        degats: 100 + (vague - 1) * 20, couleur: "#ff4d4d", invulnerable_timer: 0
                    });
                }
            });
        }

        function collision(r1, r2) {
            return r1.x < r2.x + r2.largeur && r1.x + r1.largeur > r2.x && r1.y < r2.y + r2.hauteur && r1.y + r1.hauteur > r2.y;
        }

        function ajouterXP(montant) {
            joueur_xp += montant;
            if (joueur_xp >= xp_necessaire) {
                joueur_xp -= xp_necessaire; joueur_niveau++;
                xp_necessaire = Math.floor(xp_necessaire * 1.4);
                jouerSon("levelup");
                if (Math.random() < 0.5) { hp_coffre = Math.min(max_hp_coffre, hp_coffre + 1500); message_level_up = "COFFRE SOIGNÉ ! (+1500 HP)"; }
                else { score += 150; message_level_up = "BONUS SCORE ! (+150 PTS)"; }
                level_up_timer = 90;
            }
        }

        function updatePhysique() {
            let centre_x = canvas.width / 2; let centre_y = canvas.height / 2;

            if (etat_jeu === "JEU") {
                let maintenant = Date.now(); temps_vague_timer += tickRate;
                if (temps_vague_timer >= 20000) { vague++; temps_vague_timer = 0; intervalle_spawn = Math.max(500, 1200 - (vague * 90)); }
                if (level_up_timer > 0) level_up_timer--;

                for (let i = popups_degats.length - 1; i >= 0; i--) {
                    popups_degats[i].y -= 1; popups_degats[i].vie--;
                    if (popups_degats[i].vie <= 0) popups_degats.splice(i, 1);
                }

                if (maintenant - dernier_spawn > intervalle_spawn) { faireSpawnEnnemis(); dernier_spawn = maintenant; }

                let p = types_personnages[perso_choisi];
                let vit = p.vit_base + (p.niv_vitesse - 1) * 0.8;
                let deg = p.deg_base + (p.niv_degats - 1) * 250;

                if (mode_tactile) {
                    let dx = cible_x - joueur_x; let dy = cible_y - joueur_y; let dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist > vit) { joueur_x += (dx / dist) * vit; joueur_y += (dy / dist) * vit; }
                    else { joueur_x = cible_x; joueur_y = cible_y; }
                } else {
                    if (touches["ArrowLeft"])  joueur_x -= vit;
                    if (touches["ArrowRight"]) joueur_x += vit;
                    if (touches["ArrowUp"])    joueur_y -= vit;
                    if (touches["ArrowDown"])  joueur_y += vit;
                }
                
                if (joueur_x < 0) joueur_x = 0;
                if (joueur_x > canvas.width - joueur_largeur) joueur_x = canvas.width - joueur_largeur;
                if (joueur_y < 0) joueur_y = 0;
                if (joueur_y > canvas.height - joueur_hauteur) joueur_y = canvas.height - joueur_hauteur;

                let rCoffre = { x: centre_x - taille_coffre / 2, y: centre_y - taille_coffre / 2, largeur: taille_coffre, hauteur: taille_coffre };
                let rJoueur = { x: joueur_x, y: joueur_y, largeur: joueur_largeur, hauteur: joueur_hauteur };

                for (let i = liste_ennemis.length - 1; i >= 0; i--) {
                    let e = liste_ennemis[i];
                    let dx = (centre_x - e.largeur / 2) - e.x; let dy = (centre_y - e.hauteur / 2) - e.y; let dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist > e.vitesse) { e.x += (dx / dist) * e.vitesse; e.y += (dy / dist) * e.vitesse; }
                    else { e.x = centre_x - e.largeur / 2; e.y = centre_y - e.hauteur / 2; }

                    if (e.invulnerable_timer > 0) e.invulnerable_timer--;

                    if (collision(rJoueur, e) && e.invulnerable_timer === 0) {
                        jouerSon("hit");
                        e.hp -= deg; e.invulnerable_timer = 15; 
                        popups_degats.push({ x: e.x + e.largeur / 2, y: e.y, texte: deg, vie: 30 });
                    }
                    if (collision(rCoffre, e)) { 
                        if (e.type === "kamikaze") {
                            jouerSon("explosion");
                        } else {
                            jouerSon("morsure");
                        }
                        hp_coffre -= e.degats; liste_ennemis.splice(i, 1); continue; 
                    }
                    if (e.hp <= 0) { liste_ennemis.splice(i, 1); score += 10; or_gagne += 1; or_total += 1; ajouterXP(e.type === "kamikaze" ? 35 : 20); }
                }
                
                if (hp_coffre <= 0) { 
                    hp_coffre = 0; 
                    etat_jeu = "GAMEOVER"; 
                    PokiSDK.gameplayStop();
                }
            }
        }

        function dessiner() {
            ctx.fillStyle = "#2d4a2d"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            let centre_x = canvas.width / 2; let centre_y = canvas.height / 2; let bas_y = canvas.height;

            if (etat_jeu === "MENU_PRINCIPAL") {
                ctx.fillStyle = "rgba(15, 15, 22, 1)"; ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = "#222535"; ctx.fillRect(20, 25, 140, 40);
                ctx.strokeStyle = "#fff"; ctx.strokeRect(20, 25, 140, 40);
                ctx.fillStyle = "#fff"; ctx.font = "bold 12px sans-serif"; ctx.textAlign = "center";
                ctx.fillText(document.fullscreenElement || document.webkitFullscreenElement ? "❌ QUITTER" : "📱 PLEIN ÉCRAN", 90, 49);

                ctx.fillStyle = "#222535"; ctx.fillRect(centre_x - 110, 25, 220, 40);
                ctx.strokeStyle = "#ffff00"; ctx.lineWidth = 2; ctx.strokeRect(centre_x - 110, 25, 220, 40);
                ctx.fillStyle = "#fff"; ctx.font = "bold 16px sans-serif"; ctx.textAlign = "center";
                ctx.fillText("MON OR : " + or_total + " ⛁", centre_x, 51);

                if (onglet_actif === "COMBAT") {
                    ctx.fillStyle = "#ffff00"; ctx.font = "bold 24px sans-serif"; ctx.fillText("🛡️ DÉFENDS LE COFFRE", centre_x, centre_y - 130);
                    let tailleApercu = 70;
                    dessinerHeros(perso_choisi, centre_x - tailleApercu/2, centre_y - 100, tailleApercu, tailleApercu);
                    ctx.fillStyle = "#ff4747"; ctx.fillRect(centre_x - 110, centre_y + 10, 220, 65);
                    ctx.strokeStyle = "#fff"; ctx.lineWidth = 3; ctx.strokeRect(centre_x - 110, centre_y + 10, 220, 65);
                    ctx.fillStyle = "#fff"; ctx.font = "bold 22px sans-serif"; ctx.fillText("COMBAT ▶", centre_x, centre_y + 50);
                }

                if (onglet_actif === "AMELIORATIONS") {
                    ctx.fillStyle = "#fff"; ctx.font = "bold 15px sans-serif"; ctx.fillText("CHOIX DU HÉROS", centre_x, centre_y - 135);

                    let estChoisiC = (perso_choisi === "chevalier");
                    ctx.lineWidth = estChoisiC ? 3 : 1; ctx.strokeStyle = estChoisiC ? "#ffaa00" : "#444";
                    ctx.fillStyle = estChoisiC ? "#222a22" : "#222";
                    ctx.fillRect(centre_x - 145, centre_y - 110, 90, 80); ctx.strokeRect(centre_x - 145, centre_y - 110, 90, 80);
                    dessinerHeros("chevalier", centre_x - 115, centre_y - 105, 30, 30);
                    ctx.fillStyle = "#fff"; ctx.font = "bold 10px sans-serif"; ctx.fillText("CHEVALIER", centre_x - 100, centre_y - 42);

                    let n = types_personnages.ninja; let estChoisiN = (perso_choisi === "ninja");
                    ctx.lineWidth = estChoisiN ? 3 : 1; ctx.strokeStyle = estChoisiN ? "#ffaa00" : "#444";
                    ctx.fillStyle = n.debloque ? (estChoisiN ? "#222a35" : "#222") : "#111";
                    ctx.fillRect(centre_x - 45, centre_y - 110, 90, 80); ctx.strokeRect(centre_x - 45, centre_y - 110, 90, 80);
                    dessinerHeros("ninja", centre_x - 15, centre_y - 105, 30, 30);
                    ctx.fillStyle = n.debloque ? "#fff" : "#ffff00"; ctx.font = "bold 10px sans-serif"; ctx.fillText(n.debloque ? "NINJA" : "100 ⛁", centre_x, centre_y - 42);

                    let t = types_personnages.tank; let estChoisiT = (perso_choisi === "tank");
                    ctx.lineWidth = estChoisiT ? 3 : 1; ctx.strokeStyle = estChoisiT ? "#ffaa00" : "#444";
                    ctx.fillStyle = t.debloque ? (estChoisiT ? "#301a35" : "#222") : "#111";
                    ctx.fillRect(centre_x + 55, centre_y - 110, 90, 80); ctx.strokeRect(centre_x + 55, centre_y - 110, 90, 80);
                    dessinerHeros("tank", centre_x + 85, centre_y - 105, 30, 30);
                    ctx.fillStyle = t.debloque ? "#fff" : "#ffff00"; ctx.font = "bold 10px sans-serif"; ctx.fillText(t.debloque ? "TANK" : "200 ⛁", centre_x + 100, centre_y - 42);

                    let heros = types_personnages[perso_choisi];
                    ctx.fillStyle = "#ffaa00"; ctx.font = "bold 13px sans-serif"; ctx.fillText("AMÉLIORER : " + heros.nom, centre_x, centre_y + 15);
                    let c_deg = heros.niv_degats * 10; let c_vit = heros.niv_vitesse * 15;

                    ctx.fillStyle = or_total >= c_deg ? "#1a73e8" : "#333"; ctx.fillRect(centre_x - 145, centre_y + 45, 140, 55);
                    ctx.strokeStyle = "#fff"; ctx.lineWidth = 1; ctx.strokeRect(centre_x - 145, centre_y + 45, 140, 55);
                    ctx.fillStyle = "#fff"; ctx.font = "bold 11px sans-serif"; ctx.fillText("⚔️ DÉGÂTS (Niv." + heros.niv_degats + ")", centre_x - 75, centre_y + 68);
                    ctx.fillStyle = "#ffff00"; ctx.fillText(c_deg + " ⛁", centre_x - 75, centre_y + 88);

                    ctx.fillStyle = or_total >= c_vit ? "#1a73e8" : "#333"; ctx.fillRect(centre_x + 5, centre_y + 45, 140, 55);
                    ctx.strokeRect(centre_x + 5, centre_y + 45, 140, 55);
                    ctx.fillStyle = "#fff"; ctx.font = "bold 11px sans-serif"; ctx.fillText("⚡ VITESSE (Niv." + heros.niv_vitesse + ")", centre_x + 75, centre_y + 68);
                    ctx.fillStyle = "#ffff00"; ctx.fillText(c_vit + " ⛁", centre_x + 75, centre_y + 88);
                }

                ctx.fillStyle = "#1b1c26"; ctx.fillRect(0, bas_y - 60, canvas.width, 60);
                ctx.strokeStyle = "#2d2f45"; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(0, bas_y - 60); ctx.lineTo(canvas.width, bas_y - 60); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(canvas.width / 2, bas_y - 60); ctx.lineTo(canvas.width / 2, bas_y); ctx.stroke();

                if (onglet_actif === "AMELIORATIONS") { ctx.fillStyle = "#2c2e43"; ctx.fillRect(0, bas_y - 59, canvas.width / 2 - 1, 58); }
                ctx.fillStyle = onglet_actif === "AMELIORATIONS" ? "#fff" : "#777"; ctx.font = "bold 13px sans-serif";
                ctx.fillText("🛠️ AMÉLIORATIONS", canvas.width * 0.25, bas_y - 24);

                if (onglet_actif === "COMBAT") { ctx.fillStyle = "#2c2e43"; ctx.fillRect(canvas.width / 2 + 1, bas_y - 59, canvas.width / 2, 58); }
                ctx.fillStyle = onglet_actif === "COMBAT" ? "#fff" : "#777"; ctx.font = "bold 13px sans-serif";
                ctx.fillText("⚔️ COMBAT", canvas.width * 0.75, bas_y - 24);
                return;
            }

            // --- Dessin des chemins droits (en croix) ---
            let lChemin = Math.min(canvas.width, canvas.height) * 0.18;
            ctx.fillStyle = "#5c4033"; 
            ctx.fillRect(canvas.width/2 - lChemin/2, 0, lChemin, canvas.height);
            ctx.fillRect(0, canvas.height/2 - lChemin/2, canvas.width, lChemin);

            decor.forEach(d => {
                ctx.fillStyle = "#1a4a1a";
                if(d.type === 'rond') {
                    ctx.beginPath(); ctx.arc(d.x, d.y, d.s, 0, Math.PI*2); ctx.fill();
                } else {
                    ctx.fillRect(d.x, d.y, d.s, d.s);
                }
            });

            liste_ennemis.forEach(e => {
                if (e.type === "kamikaze") {
                    ctx.fillStyle = "#ff6600"; ctx.beginPath(); ctx.arc(e.x + e.largeur/2, e.y + e.hauteur/2, e.largeur/2, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = "#fff"; ctx.fillRect(e.x + e.largeur*0.4, e.y - 4, e.largeur*0.2, 5); 
                    ctx.fillStyle = "#ffff00"; ctx.fillRect(e.x + e.largeur*0.35, e.y - 8, e.largeur*0.3, e.largeur*0.3); 
                } else {
                    ctx.fillStyle = "#ff4d4d"; ctx.fillRect(e.x, e.y, e.largeur, e.hauteur);
                    dessinerGrandesCornes(e);
                    ctx.fillStyle = "#fff"; ctx.fillRect(e.x + e.largeur*0.2, e.y + 6, e.largeur*0.15, e.largeur*0.15); ctx.fillRect(e.x + e.largeur*0.6, e.y + 6, e.largeur*0.15, e.largeur*0.15); 
                }
                ctx.fillStyle = "#000"; ctx.fillRect(e.x, e.y - 14, e.largeur, 5);
                ctx.fillStyle = "#ff0000"; ctx.fillRect(e.x, e.y - 14, Math.max(0, (e.hp / e.max_hp) * e.largeur), 5);
            });

            ctx.fillStyle = "#d4af37"; ctx.fillRect(centre_x - taille_coffre / 2, centre_y - taille_coffre / 2, taille_coffre, taille_coffre);
            ctx.fillStyle = "#aa8413"; ctx.fillRect(centre_x - taille_coffre / 2 + 10, centre_y - taille_coffre / 2 + 10, taille_coffre - 20, taille_coffre - 20);
            ctx.fillStyle = "#555"; ctx.fillRect(centre_x - 10, centre_y - 20, 20, 40); 

            let lBarre = Math.min(canvas.width * 0.5, 200);
            ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(centre_x - lBarre / 2, centre_y - taille_coffre / 2 - 25, lBarre, 10);
            ctx.fillStyle = "#00ff00"; ctx.fillRect(centre_x - lBarre / 2, centre_y - taille_coffre / 2 - 25, (hp_coffre / max_hp_coffre) * lBarre, 10);

            popups_degats.forEach(p => { ctx.fillStyle = "#ff3333"; ctx.font = "bold 15px sans-serif"; ctx.textAlign = "center"; ctx.fillText("-" + p.texte, p.x, p.y); });
            ctx.fillStyle = "#333"; ctx.fillRect(0, 0, canvas.width, 6);
            ctx.fillStyle = "#00bfff"; ctx.fillRect(0, 0, (joueur_xp / xp_necessaire) * canvas.width, 6);

            ctx.fillStyle = "#fff"; ctx.font = "bold 15px sans-serif"; ctx.textAlign = "left";
            ctx.fillText("SCORE: " + score, 20, 30); ctx.fillText("OR: +" + or_gagne + "⛁", 20, 52); ctx.fillText("NIV. " + joueur_niveau, 20, 74);
            ctx.textAlign = "right"; ctx.fillText("VAGUE: " + vague, canvas.width - 20, 30);

            if (level_up_timer > 0) { ctx.fillStyle = "#00bfff"; ctx.font = "bold 20px sans-serif"; ctx.textAlign = "center"; ctx.fillText("LEVEL UP ! " + message_level_up, centre_x, 45); }

            dessinerHeros(perso_choisi, joueur_x, joueur_y, joueur_largeur, joueur_hauteur);

            if (etat_jeu === "GAMEOVER") {
                ctx.fillStyle = "rgba(0, 0, 0, 0.9)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#ff4d4d"; ctx.font = "bold 25px sans-serif"; ctx.textAlign = "center"; ctx.fillText("LE COFFRE A ÉTÉ DÉTRUIT !", centre_x, centre_y - 100);
                ctx.fillStyle = "#aaa"; ctx.font = "18px sans-serif"; ctx.fillText("Score final : " + score, centre_x, centre_y - 50);
                ctx.fillStyle = "#ffff00"; ctx.fillText("Or accumulé : +" + or_gagne + " ⛁", centre_x, centre_y - 20);
                ctx.fillStyle = "#00ff00"; ctx.fillRect(centre_x - 120, centre_y + 60, 240, 50);
                ctx.fillStyle = "#000"; ctx.font = "bold 18px sans-serif"; ctx.fillText("RETOUR AU MENU ↻", centre_x, centre_y + 92);
            }
        }

        function bouclePrincipale(tempsActuel) {
            let tempsEcoule = tempsActuel - tempsPrecedent;
            if (tempsEcoule > 250) tempsEcoule = 250; 
            tempsPrecedent = tempsActuel; accumulateur += tempsEcoule;
            while (accumulateur >= tickRate) { updatePhysique(); accumulateur -= tickRate; }
            dessiner(); requestAnimationFrame(bouclePrincipale);
        }

        window.addEventListener('load', () => {
            chargerDonnees(); 
            redimensionner();
            PokiSDK.gameLoadingFinished();
            tempsPrecedent = performance.now(); 
            requestAnimationFrame(bouclePrincipale);
        });
    </script>
</body>
