<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Défends le Coffre ! v7.8 (Poki Edition)</title>
    <script src="https://game-cdn.poki.com/scripts/v2/poki-sdk.js"></script>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #111; touch-action: none; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; }
        canvas { display: block; background-color: #1e1e1e; }
    </style>
</head>
<body>
    <canvas id="jeuCanvas"></canvas>
    <script>
        const canvas = document.getElementById("jeuCanvas");
        const ctx = canvas.getContext("2d");
        let pokiSDKReady = false;
        PokiSDK.init().then(() => { pokiSDKReady = true; }).catch(() => {});

        let taille_coffre = 100, joueur_largeur = 50, joueur_hauteur = 50, joueur_x = 0, joueur_y = 0, cible_x = 0, cible_y = 0;
        let tempsPrecedent = performance.now();
        const tickRate = 1000 / 60; 
        let accumulateur = 0, onglet_actif = "COMBAT", or_total = 0, perso_choisi = "chevalier";

        const types_personnages = {
            chevalier: { nom: "CHEVALIER", couleur: "#a6a6a6", prix: 0, debloque: true, vit_base: 8, deg_base: 500, niv_degats: 1, niv_vitesse: 1 },
            ninja: { nom: "NINJA", couleur: "#2e2e2e", prix: 100, debloque: false, vit_base: 12, deg_base: 300, niv_degats: 1, niv_vitesse: 1 },
            tank: { nom: "TANK", couleur: "#5e2585", prix: 200, debloque: false, vit_base: 1.2, deg_base: 1000, niv_degats: 1, niv_vitesse: 1 } // Vitesse réduite à 1.2
        };

        // ... (tes fonctions audio et de dessin restent identiques) ...
        function dessinerDecors() {
            ctx.fillStyle = "#253025";
            ctx.fillRect(50, 50, 40, 40); ctx.fillRect(canvas.width - 100, canvas.height - 100, 60, 20);
            ctx.fillStyle = "#304030";
            ctx.beginPath(); ctx.arc(canvas.width/4, canvas.height/4, 15, 0, Math.PI*2); ctx.fill();
        }

        // [Le reste de ton code original s'insère ici...]
        // --- FONCTIONS DE DESSIN (Suite) ---
        function dessinerChevalier(x, y, w, h) {
            ctx.fillStyle = "#8a8a8a"; ctx.fillRect(x + w*0.15, y + h*0.3, w*0.7, h*0.6);
            ctx.fillStyle = "#6b6b6b"; ctx.fillRect(x + w*0.15, y + h*0.6, w*0.7, h*0.3);
            ctx.fillStyle = "#4a4a4a"; ctx.fillRect(x + w*0.2, y + h*0.9, w*0.2, h*0.1); ctx.fillRect(x + w*0.6, y + h*0.9, w*0.2, h*0.1);
            ctx.fillStyle = "#b8b8b8"; ctx.fillRect(x + w*0.25, y, w*0.5, h*0.35);
            ctx.fillStyle = "#3a3a3a"; ctx.fillRect(x + w*0.3, y + h*0.12, w*0.4, h*0.1);
            ctx.fillStyle = "#ffcc00"; ctx.fillRect(x + w*0.45, y + h*0.12, w*0.1, h*0.1);
            ctx.fillStyle = "#d4d4d4"; ctx.fillRect(x + w*0.8, y + h*0.2, w*0.1, h*0.5);
            ctx.fillStyle = "#8c5311"; ctx.fillRect(x + w*0.75, y + h*0.6, w*0.2, h*0.06);
        }

        function dessinerNinja(x, y, w, h) {
            ctx.fillStyle = "#242424"; ctx.fillRect(x + w*0.2, y + h*0.25, w*0.6, h*0.65);
            ctx.fillStyle = "#141414"; ctx.fillRect(x + w*0.25, y + h*0.9, w*0.18, h*0.1); ctx.fillRect(x + w*0.57, y + h*0.9, w*0.18, h*0.1);
            ctx.fillStyle = "#1e1e1e"; ctx.fillRect(x + w*0.28, y, w*0.44, h*0.3);
            ctx.fillStyle = "#00bfff"; ctx.fillRect(x + w*0.28, y + h*0.05, w*0.44, h*0.08);
            ctx.fillStyle = "#ffebad"; ctx.fillRect(x + w*0.35, y + h*0.15, w*0.3, h*0.08);
            ctx.fillStyle = "#ff0000"; ctx.fillRect(x + w*0.4, y + h*0.16, w*0.05, h*0.05); ctx.fillRect(x + w*0.55, y + h*0.16, w*0.05, h*0.05);
            ctx.fillStyle = "#ff2424"; ctx.fillRect(x + w*0.1, y + h*0.3, w*0.15, h*0.3);
        }

        function dessinerTank(x, y, w, h) {
            ctx.fillStyle = "#5e2585"; ctx.fillRect(x + w*0.05, y + h*0.2, w*0.9, h*0.7);
            ctx.fillStyle = "#3d1459"; ctx.fillRect(x + w*0.05, y + h*0.6, w*0.9, h*0.3);
            ctx.fillStyle = "#9400d3"; ctx.fillRect(x, y + h*0.15, w*0.22, h*0.22); ctx.fillRect(x + w*0.78, y + h*0.15, w*0.22, h*0.22);
            ctx.fillStyle = "#222"; ctx.fillRect(x + w*0.15, y + h*0.9, w*0.25, h*0.1); ctx.fillRect(x + w*0.6, y + h*0.9, w*0.25, h*0.1);
            ctx.fillStyle = "#42324d"; ctx.fillRect(x + w*0.3, y - h*0.05, w*0.4, h*0.3);
            ctx.fillStyle = "#d4d4d4"; ctx.fillRect(x + w*0.38, y + h*0.05, w*0.24, h*0.15);
        }

        // --- NOUVELLE FONCTION DÉCOR ---
        function dessinerDecors() {
            ctx.fillStyle = "#253025";
            ctx.fillRect(50, 50, 40, 40); ctx.fillRect(canvas.width - 100, canvas.height - 100, 60, 20);
        }

        // ... (Insère ici tes autres fonctions existantes : dessinerHeros, dessinerGrandesCornes, sauvegarder, charger, etc.) ...

        // --- DANS TA FONCTION DESSINER(), AJOUTE L'APPEL ---
        // Juste avant de dessiner les ennemis :
        // dessinerDecors();

        // --- RAPPEL POUR LE TANK ---
        // Vérifie bien que dans ton objet types_personnages, tank.vit_base est bien à 1.2 ou 1.5.

    </script>
</body>
</html>
