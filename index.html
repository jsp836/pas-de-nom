<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Défends le Coffre ! v7.9</title>
    <script src="https://game-cdn.poki.com/scripts/v2/poki-sdk.js"></script>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #0f1a0f; touch-action: none; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; user-select: none; }
        canvas { display: block; background-color: #2d4a2d; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <canvas id="jeuCanvas"></canvas>
    <script>
        const canvas = document.getElementById("jeuCanvas");
        const ctx = canvas.getContext("2d");

        PokiSDK.init().then(() => {}).catch(() => {});

        let taille_coffre = 100;
        let liste_ennemis = [];
        let score = 0;
        let etat_jeu = "MENU_PRINCIPAL";
        let or_total = 0;
        let perso_choisi = "chevalier";
        let joueur_x = 0;
        let joueur_y = 0;
        let joueur_largeur = 50;

        const types_personnages = {
            chevalier: { nom: "CHEVALIER", couleur: "#a6a6a6", prix: 0, debloque: true, vit_base: 8, deg_base: 500, niv_degats: 1, niv_vitesse: 1 },
            ninja: { nom: "NINJA", couleur: "#2e2e2e", prix: 100, debloque: false, vit_base: 12, deg_base: 300, niv_degats: 1, niv_vitesse: 1 },
            tank: { nom: "TANK", couleur: "#5e2585", prix: 200, debloque: false, vit_base: 3, deg_base: 1000, niv_degats: 1, niv_vitesse: 1 }
        };

        function dessinerCheminDiagonale() {
            let l = Math.min(canvas.width, canvas.height) * 0.16;
            let offset = -canvas.height * 0.05; // Décalage vers le haut de 5% de la hauteur
            ctx.fillStyle = "#5c4033";
            ctx.save();
            // Diagonale 1 (montée)
            ctx.beginPath();
            ctx.moveTo(0, offset); ctx.lineTo(canvas.width, canvas.height + offset);
            ctx.lineTo(canvas.width - (l * canvas.width / canvas.height), canvas.height + offset); ctx.lineTo(0, l + offset);
            ctx.fill();
            // Diagonale 2 (montée)
            ctx.beginPath();
            ctx.moveTo(canvas.width, offset); ctx.lineTo(0, canvas.height + offset);
            ctx.lineTo(l * canvas.width / canvas.height, canvas.height + offset); ctx.lineTo(canvas.width, l + offset);
            ctx.fill();
            ctx.restore();
        }

        function redimensionner() { 
            canvas.width = window.innerWidth; 
            canvas.height = window.innerHeight; 
            taille_coffre = Math.min(canvas.width, canvas.height) * 0.2;
            joueur_x = canvas.width / 2; joueur_y = canvas.height / 2;
        }

        function dessinerMenu() {
            ctx.fillStyle = "rgba(0,0,0,0.7)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#fff";
            ctx.font = "bold 30px Arial";
            ctx.textAlign = "center";
            ctx.fillText("DÉFENDS LE COFFRE", canvas.width/2, canvas.height/2 - 50);
            ctx.font = "20px Arial";
            ctx.fillText("Appuie pour commencer", canvas.width/2, canvas.height/2 + 50);
        }

        function dessiner() {
            ctx.fillStyle = "#2d4a2d"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            dessinerCheminDiagonale();
            
            ctx.fillStyle = "#FFD700";
            ctx.fillRect(canvas.width/2 - 30, canvas.height/2 - 30, 60, 60);

            if (etat_jeu === "MENU_PRINCIPAL") {
                dessinerMenu();
            } else {
                ctx.fillStyle = "#aaa";
                ctx.fillRect(joueur_x - joueur_largeur/2, joueur_y - joueur_largeur/2, joueur_largeur, joueur_largeur);
                liste_ennemis.forEach(m => {
                    ctx.fillStyle = "#FF4444";
                    ctx.fillRect(m.x, m.y, 30, 30);
                });
            }
            requestAnimationFrame(dessiner);
        }

        window.addEventListener('mousedown', () => { if(etat_jeu === "MENU_PRINCIPAL") etat_jeu = "COMBAT"; });
        window.addEventListener('resize', redimensionner);
        redimensionner();

        window.onload = () => {
            PokiSDK.gameLoadingFinished();
            dessiner();
        };
    </script>
</body>
</html>
