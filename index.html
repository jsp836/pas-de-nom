<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Défends le Coffre ! v6.2</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #111;
            touch-action: none; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
            background-color: #1e1e1e;
        }
    </style>
</head>
<body>

    <canvas id="jeuCanvas"></canvas>

    <script>
        const canvas = document.getElementById("jeuCanvas");
        const ctx = canvas.getContext("2d");

        let taille_coffre = 100; 
        let joueur_largeur = 50;   
        let joueur_hauteur = 50;   
        let joueur_x = 0;
        let joueur_y = 0;
        let cible_x = 0;
        let cible_y = 0;

        let tempsPrecedent = performance.now();
        const tickRate = 1000 / 60; 
        let accumulateur = 0;

        // --- NAVIGATION STYLE CLASH ROYALE ---
        let onglet_actif = "COMBAT"; // "COMBAT" ou "BOUTIQUE"

        // --- MONNAIE GLOBALE ---
        let or_total = 0;

        // --- STATS INDÉPENDANTES DES PERSONNAGES ---
        let perso_choisi = "chevalier";
        const types_personnages = {
            chevalier: { 
                nom: "CHEVALIER", couleur: "#00ff00", prix: 0, debloque: true,
                vit_base: 8, deg_base: 500, niv_degats: 1, niv_vitesse: 1 
            },
            ninja: { 
                nom: "NINJA", couleur: "#00bfff", prix: 100, debloque: false,
                vit_base: 12, deg_base: 300, niv_degats: 1, niv_vitesse: 1 
            },
            tank: { 
                nom: "TANK", couleur: "#9400d3", prix: 200, debloque: false,
                vit_base: 5, deg_base: 1000, niv_degats: 1, niv_vitesse: 1 
            }
        };

        // --- SAUVEGARDE AUTOMATIQUE ---
        function sauvegarderDonnees() {
            const donnees = {
                or_total: or_total,
                perso_choisi: perso_choisi,
                ninja_debloque: types_personnages.ninja.debloque,
                tank_debloque: types_personnages.tank.debloque,
                chevalier_deg: types_personnages.chevalier.niv_degats,
                chevalier_vit: types_personnages.chevalier.niv_vitesse,
                ninja_deg: types_personnages.ninja.niv_degats,
                ninja_vit: types_personnages.ninja.niv_vitesse,
                tank_deg: types_personnages.tank.niv_degats,
                tank_vit: types_personnages.tank.niv_vitesse
            };
            localStorage.setItem("defends_le_coffre_sauvegarde", JSON.stringify(donnees));
        }

        function chargerDonnees() {
            const sauvegarde = localStorage.getItem("defends_le_coffre_sauvegarde");
            if (sauvegarde) {
                try {
                    const d = JSON.parse(sauvegarde);
                    or_total = d.or_total ?? 0;
                    perso_choisi = d.perso_choisi ?? "chevalier";
                    types_personnages.ninja.debloque = d.ninja_debloque ?? false;
                    types_personnages.tank.debloque = d.tank_debloque ?? false;
                    
                    types_personnages.chevalier.niv_degats = d.chevalier_deg ?? 1;
                    types_personnages.chevalier.niv_vitesse = d.chevalier_vit ?? 1;
                    types_personnages.ninja.niv_degats = d.ninja_deg ?? 1;
                    types_personnages.ninja.niv_vitesse = d.ninja_vit ?? 1;
                    types_personnages.tank.niv_degats = d.tank_deg ?? 1;
                    types_personnages.tank.niv_vitesse = d.tank_vit ?? 1;
                } catch (e) {
                    console.error(e);
                }
            }
        }

        // --- STATS EN PARTIE ---
        let hp_coffre = 10000;
        let max_hp_coffre = 10000;
        let etat_jeu = "MENU_PRINCIPAL"; 
        let score = 0;
        let or_gagne = 0;
        let vague = 1;
        let temps_vague_timer = 0;

        // --- XP & EFFETS ---
        let joueur_niveau = 1;
        let joueur_xp = 0;
        let xp_necessaire = 100;
        let message_level_up = "";
        let level_up_timer = 0;
        let popups_degats = [];

        // --- ENNEMIS ---
        let liste_ennemis = [];
        let dernier_spawn = 0;
        let intervalle_spawn = 1200; 
        let mode_tactile = false;
        let touches = {};

        window.addEventListener("keydown", (e) => { touches[e.code] = true; mode_tactile = false; });
        window.addEventListener("keyup", (e) => touches[e.code] = false);

        function verifierClicsMenus(x, y) {
            let centre_x = canvas.width / 2;
            let centre_y = canvas.height / 2;
            let bas_y = canvas.height;

            if (etat_jeu === "MENU_PRINCIPAL") {
                // --- CLICS SUR LES ONGLETS DU BAS (Toujours actifs sur le menu) ---
                if (y >= bas_y - 60 && y <= bas_y) {
                    if (x >= 0 && x < canvas.width / 2) {
                        onglet_actif = "BOUTIQUE";
                    } else {
                        onglet_actif = "COMBAT";
                    }
                    return true;
                }

                // --- CONTENU ONGLET COMBAT ---
                if (onglet_actif === "COMBAT") {
                    // Bouton JOUER
                    if (x >= centre_x - 110 && x <= centre_x + 110 && y >= centre_y - 40 && y <= centre_y + 30) {
                        demarrerLaVraiePartie();
                        return true;
                    }
                }

                // --- CONTENU ONGLET BOUTIQUE ---
                if (onglet_actif === "BOUTIQUE") {
                    // Sélection / Achat des Héros (Ligne du haut de la boutique)
                    // Chevalier
                    if (x >= centre_x - 145 && x <= centre_x - 55 && y >= centre_y - 100 && y <= centre_y - 20) {
                        perso_choisi = "chevalier"; 
                        sauvegarderDonnees();
                        return true;
                    }
                    // Ninja
                    if (x >= centre_x - 45 && x <= centre_x + 45 && y >= centre_y - 100 && y <= centre_y - 20) {
                        let n = types_personnages.ninja;
                        if (n.debloque) {
                            perso_choisi = "ninja";
                        } else if (or_total >= n.prix) { 
                            or_total -= n.prix; n.debloque = true; perso_choisi = "ninja"; 
                        }
                        sauvegarderDonnees();
                        return true;
                    }
                    // Tank
                    if (x >= centre_x + 55 && x <= centre_x + 145 && y >= centre_y - 100 && y <= centre_y - 20) {
                        let t = types_personnages.tank;
                        if (t.debloque) {
                            perso_choisi = "tank";
                        } else if (or_total >= t.prix) { 
                            or_total -= t.prix; t.debloque = true; perso_choisi = "tank"; 
                        }
                        sauvegarderDonnees();
                        return true;
                    }

                    // Boutons d'Upgrades du héros sélectionné
                    let heros = types_personnages[perso_choisi];
                    let c_deg = heros.niv_degats * 10;
                    let c_vit = heros.niv_vitesse * 15;

                    // +Dégâts
                    if (x >= centre_x - 145 && x <= centre_x - 5 && y >= centre_y + 40 && y <= centre_y + 95) {
                        if (or_total >= c_deg) { or_total -= c_deg; heros.niv_degats++; sauvegarderDonnees(); }
                        return true;
                    }
                    // +Vitesse
                    if (x >= centre_x + 5 && x <= centre_x + 145 && y >= centre_y + 40 && y <= centre_y + 95) {
                        if (or_total >= c_vit) { or_total -= c_vit; heros.niv_vitesse++; sauvegarderDonnees(); }
                        return true;
                    }
                }
            }

            if (etat_jeu === "GAMEOVER") {
                if (x >= centre_x - 120 && x <= centre_x + 120 && y >= centre_y + 60 && y <= centre_y + 110) {
                    etat_jeu = "MENU_PRINCIPAL";
                    onglet_actif = "COMBAT";
                    sauvegarderDonnees();
                    return true;
                }
            }
            return false;
        }

        function goulotDoigt(clientX, clientY) {
            if (verifierClicsMenus(clientX, clientY)) return;
            if (etat_jeu === "JEU") {
                mode_tactile = true;
                cible_x = clientX - joueur_largeur / 2;
                cible_y = clientY - joueur_hauteur / 2;
            }
        }

        canvas.addEventListener("mousedown", (e) => goulotDoigt(e.clientX, e.clientY));
        canvas.addEventListener("touchstart", (e) => {
            if(e.touches.length > 0) goulotDoigt(e.touches[0].clientX, e.touches[0].clientY);
        });
        canvas.addEventListener("touchmove", (e) => {
            e.preventDefault(); 
            if(etat_jeu === "JEU" && e.touches.length > 0) {
                cible_x = e.touches[0].clientX - joueur_largeur / 2;
                cible_y = e.touches[0].clientY - joueur_hauteur / 2;
                mode_tactile = true;
            }
        }, { passive: false });

        function redimensionner() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            let tailleMin = Math.min(canvas.width, canvas.height);
            taille_coffre = tailleMin * 0.22; 
            joueur_largeur = tailleMin * 0.1;
            joueur_hauteur = tailleMin * 0.1;

            if (etat_jeu === "JEU") {
                joueur_x = canvas.width / 2 - joueur_largeur / 2;
                joueur_y = canvas.height / 2 - joueur_hauteur / 2 + (taille_coffre * 1.1);
                cible_x = joueur_x; cible_y = joueur_y;
            }
        }
        window.addEventListener('resize', redimensionner);

        function demarrerLaVraiePartie() {
            hp_coffre = 10000; score = 0; or_gagne = 0; vague = 1; temps_vague_timer = 0;
            joueur_niveau = 1; joueur_xp = 0; xp_necessaire = 100; intervalle_spawn = 1200;
            liste_ennemis = []; popups_degats = []; dernier_spawn = Date.now();
            mode_tactile = false; etat_jeu = "JEU";
            redimensionner();
        }

        function faireSpawnEnnemis() {
            let coins = [{x: 0, y: 0}, {x: canvas.width, y: 0}, {x: 0, y: canvas.height}, {x: canvas.width, y: canvas.height}];
            let tEnnemi = Math.min(canvas.width, canvas.height) * 0.08;

            coins.forEach((coin) => {
                let estKamikaze = vague >= 2 && Math.random() < 0.35;
                if (estKamikaze) {
                    liste_ennemis.push({
                        type: "kamikaze", x: coin.x - (tEnnemi*0.7/2), y: coin.y - (tEnnemi*0.7/2),
                        largeur: tEnnemi * 0.7, hauteur: tEnnemi * 0.7, vitesse: (4 + (vague - 1) * 0.4) * 1.6,
                        hp: (1000 + (vague - 1) * 350) * 0.4, max_hp: (1000 + (vague - 1) * 350) * 0.4,
                        degats: (100 + (vague - 1) * 20) * 1.5, couleur: "#ff9900", invulnerable_timer: 0
                    });
                } else {
                    liste_ennemis.push({
                        type: "normal", x: coin.x - (tEnnemi/2), y: coin.y - (tEnnemi/2),
                        largeur: tEnnemi, hauteur: tEnnemi, vitesse: Math.min(7.5, 4 + (vague - 1) * 0.4), 
                        hp: 1000 + (vague - 1) * 350, max_hp: 1000 + (vague - 1) * 350,
                        degats: 100 + (vague - 1) * 20, couleur: "#ff4d4d", invulnerable_timer: 0
                    });
                }
            });
        }

        function collision(r1, r2) {
            return r1.x < r2.x + r2.largeur && r1.x + r1.largeur > r2.x && r1.y < r2.y + r2.hauteur && r1.y + r1.hauteur > r2.y;
        }

        function ajouterXP(montant) {
            joueur_xp += montant;
            if (joueur_xp >= xp_necessaire) {
                joueur_xp -= xp_necessaire; joueur_niveau++;
                xp_necessaire = Math.floor(xp_necessaire * 1.4);
                if (Math.random() < 0.5) { hp_coffre = Math.min(max_hp_coffre, hp_coffre + 1500); message_level_up = "COFFRE SOIGNÉ ! (+1500 HP)"; }
                else { score += 150; message_level_up = "BONUS SCORE ! (+150 PTS)"; }
                level_up_timer = 90;
            }
        }

        function updatePhysique() {
            let centre_x = canvas.width / 2;
            let centre_y = canvas.height / 2;

            if (etat_jeu === "JEU") {
                let maintenant = Date.now();
                temps_vague_timer += tickRate;
                if (temps_vague_timer >= 20000) { vague++; temps_vague_timer = 0; intervalle_spawn = Math.max(500, 1200 - (vague * 90)); }
                if (level_up_timer > 0) level_up_timer--;

                for (let i = popups_degats.length - 1; i >= 0; i--) {
                    popups_degats[i].y -= 1; popups_degats[i].vie--;
                    if (popups_degats[i].vie <= 0) popups_degats.splice(i, 1);
                }

                if (maintenant - dernier_spawn > intervalle_spawn) { faireSpawnEnnemis(); dernier_spawn = maintenant; }

                let p = types_personnages[perso_choisi];
                let vit = p.vit_base + (p.niv_vitesse - 1) * 0.8;
                let deg = p.deg_base + (p.niv_degats - 1) * 250;

                if (mode_tactile) {
                    let dx = cible_x - joueur_x; let dy = cible_y - joueur_y;
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist > vit) { joueur_x += (dx / dist) * vit; joueur_y += (dy / dist) * vit; }
                    else { joueur_x = cible_x; joueur_y = cible_y; }
                } else {
                    if (touches["ArrowLeft"])  joueur_x -= vit;
                    if (touches["ArrowRight"]) joueur_x += vit;
                    if (touches["ArrowUp"])    joueur_y -= vit;
                    if (touches["ArrowDown"])  joueur_y += vit;
                }
                
                if (joueur_x < 0) joueur_x = 0;
                if (joueur_x > canvas.width - joueur_largeur) joueur_x = canvas.width - joueur_largeur;
                if (joueur_y < 0) joueur_y = 0;
                if (joueur_y > canvas.height - joueur_hauteur) joueur_y = canvas.height - joueur_hauteur;

                let rCoffre = { x: centre_x - taille_coffre / 2, y: centre_y - taille_coffre / 2, largeur: taille_coffre, hauteur: taille_coffre };
                let rJoueur = { x: joueur_x, y: joueur_y, largeur: joueur_largeur, hauteur: joueur_hauteur };

                for (let i = liste_ennemis.length - 1; i >= 0; i--) {
                    let e = liste_ennemis[i];
                    let dx = (centre_x - e.largeur / 2) - e.x;
                    let dy = (centre_y - e.hauteur / 2) - e.y;
                    let dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist > e.vitesse) { e.x += (dx / dist) * e.vitesse; e.y += (dy / dist) * e.vitesse; }
                    else { e.x = centre_x - e.largeur / 2; e.y = centre_y - e.hauteur / 2; }

                    if (e.invulnerable_timer > 0) e.invulnerable_timer--;

                    if (collision(rJoueur, e) && e.invulnerable_timer === 0) {
                        e.hp -= deg; e.invulnerable_timer = 15; 
                        popups_degats.push({ x: e.x + e.largeur / 2, y: e.y, texte: deg, vie: 30 });
                    }
                    if (collision(rCoffre, e)) { hp_coffre -= e.degats; liste_ennemis.splice(i, 1); continue; }
                    if (e.hp <= 0) { liste_ennemis.splice(i, 1); score += 10; or_gagne += 1; or_total += 1; ajouterXP(e.type === "kamikaze" ? 35 : 20); }
                }
                if (hp_coffre <= 0) { hp_coffre = 0; etat_jeu = "GAMEOVER"; }
            }
        }

        function dessiner() {
            ctx.fillStyle = "#1e1e1e";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            let centre_x = canvas.width / 2;
            let centre_y = canvas.height / 2;
            let bas_y = canvas.height;

            if (etat_jeu === "MENU_PRINCIPAL") {
                ctx.fillStyle = "rgba(15, 15, 22, 1)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // --- HEADER COMMUN COMPTEUR D'OR ---
                ctx.fillStyle = "#222535"; ctx.fillRect(centre_x - 110, 25, 220, 40);
                ctx.strokeStyle = "#ffff00"; ctx.lineWidth = 2; ctx.strokeRect(centre_x - 110, 25, 220, 40);
                ctx.fillStyle = "#fff"; ctx.font = "bold 16px sans-serif"; ctx.textAlign = "center";
                ctx.fillText("MON OR : " + or_total + " ⛁", centre_x, 51);

                // ============================================
                // OGELET ACTIF : COMBAT (Page d'accueil)
                // ============================================
                if (onglet_actif === "COMBAT") {
                    ctx.fillStyle = "#ffff00"; ctx.font = "bold 24px sans-serif";
                    ctx.fillText("🛡️ DEFENDS LE COFFRE", centre_x, centre_y - 120);

                    // Gros Bouton Jouer
                    ctx.fillStyle = "#ff4747"; ctx.fillRect(centre_x - 110, centre_y - 40, 220, 70);
                    ctx.strokeStyle = "#fff"; ctx.lineWidth = 3; ctx.strokeRect(centre_x - 110, centre_y - 40, 220, 70);
                    ctx.fillStyle = "#fff"; ctx.font = "bold 24px sans-serif";
                    ctx.fillText("COMBAT ▶", centre_x, centre_y + 4);

                    // Info Perso Actuel
                    let h = types_personnages[perso_choisi];
                    ctx.fillStyle = "#aaa"; ctx.font = "14px sans-serif";
                    ctx.fillText("Héros équipé : ", centre_x, centre_y + 80);
                    ctx.fillStyle = h.couleur; ctx.font = "bold 16px sans-serif";
                    ctx.fillText(h.nom, centre_x, centre_y + 105);
                }

                // ============================================
                // ONGLET ACTIF : BOUTIQUE (Cartes et Upgrades)
                // ============================================
                if (onglet_actif === "BOUTIQUE") {
                    ctx.fillStyle = "#fff"; ctx.font = "bold 16px sans-serif";
                    ctx.fillText("DECK DE COMBAT", centre_x, centre_y - 130);

                    // --- Rangée des Héros ---
                    // Chevalier
                    let c = types_personnages.chevalier; let estChoisiC = (perso_choisi === "chevalier");
                    ctx.lineWidth = estChoisiC ? 3 : 1; ctx.strokeStyle = estChoisiC ? "#00ff00" : "#444";
                    ctx.fillStyle = estChoisiC ? "#1a331a" : "#222";
                    ctx.fillRect(centre_x - 145, centre_y - 100, 90, 80); ctx.strokeRect(centre_x - 145, centre_y - 100, 90, 80);
                    ctx.fillStyle = "#00ff00"; ctx.font = "bold 12px sans-serif"; ctx.fillText("CHEVALIER", centre_x - 100, centre_y - 70);
                    ctx.fillStyle = "#aaa"; ctx.font = "10px sans-serif"; ctx.fillText("ÉQUIPÉ", centre_x - 100, centre_y - 40);

                    // Ninja
                    let n = types_personnages.ninja; let estChoisiN = (perso_choisi === "ninja");
                    ctx.lineWidth = estChoisiN ? 3 : 1; ctx.strokeStyle = estChoisiN ? "#00bfff" : "#444";
                    ctx.fillStyle = n.debloque ? (estChoisiN ? "#142d3d" : "#222") : (or_total >= n.prix ? "#152535" : "#111");
                    ctx.fillRect(centre_x - 45, centre_y - 100, 90, 80); ctx.strokeRect(centre_x - 45, centre_y - 100, 90, 80);
                    ctx.fillStyle = "#00bfff"; ctx.font = "bold 12px sans-serif"; ctx.fillText("NINJA", centre_x, centre_y - 70);
                    ctx.fillStyle = "#ffff00"; ctx.font = "10px sans-serif"; ctx.fillText(n.debloque ? (estChoisiN ? "ÉQUIPÉ" : "DISPO") : n.prix + " ⛁", centre_x, centre_y - 40);

                    // Tank
                    let t = types_personnages.tank; let estChoisiT = (perso_choisi === "tank");
                    ctx.lineWidth = estChoisiT ? 3 : 1; ctx.strokeStyle = estChoisiT ? "#9400d3" : "#444";
                    ctx.fillStyle = t.debloque ? (estChoisiT ? "#2d143d" : "#222") : (or_total >= t.prix ? "#2d1535" : "#111");
                    ctx.fillRect(centre_x + 55, centre_y - 100, 90, 80); ctx.strokeRect(centre_x + 55, centre_y - 100, 90, 80);
                    ctx.fillStyle = "#9400d3"; ctx.font = "bold 12px sans-serif"; ctx.fillText("TANK", centre_x + 100, centre_y - 70);
                    ctx.fillStyle = "#ffff00"; ctx.font = "10px sans-serif"; ctx.fillText(t.debloque ? (estChoisiT ? "ÉQUIPÉ" : "DISPO") : t.prix + " ⛁", centre_x + 100, centre_y - 40);

                    // --- Améliorations Dynamiques du Héros Sélectionné ---
                    let heros = types_personnages[perso_choisi];
                    ctx.fillStyle = heros.couleur; ctx.font = "bold 13px sans-serif"; 
                    ctx.fillText("NIVEAUX DE " + heros.nom, centre_x, centre_y + 15);
                    
                    let c_deg = heros.niv_degats * 10; let c_vit = heros.niv_vitesse * 15;

                    // Case Dégâts
                    ctx.fillStyle = or_total >= c_deg ? "#2646c4" : "#333"; ctx.fillRect(centre_x - 145, centre_y + 40, 140, 55);
                    ctx.strokeStyle = "#fff"; ctx.lineWidth = 1; ctx.strokeRect(centre_x - 145, centre_y + 40, 140, 55);
                    ctx.fillStyle = "#fff"; ctx.font = "bold 11px sans-serif"; ctx.fillText("⚔️ DÉGÂTS (Niv." + heros.niv_degats + ")", centre_x - 75, centre_y + 62);
                    ctx.fillStyle = "#ffff00"; ctx.fillText(c_deg + " ⛁", centre_x - 75, centre_y + 82);

                    // Case Vitesse
                    ctx.fillStyle = or_total >= c_vit ? "#2646c4" : "#333"; ctx.fillRect(centre_x + 5, centre_y + 40, 140, 55);
                    ctx.strokeRect(centre_x + 5, centre_y + 40, 140, 55);
                    ctx.fillStyle = "#fff"; ctx.font = "bold 11px sans-serif"; ctx.fillText("⚡ VITESSE (Niv." + heros.niv_vitesse + ")", centre_x + 75, centre_y + 62);
                    ctx.fillStyle = "#ffff00"; ctx.fillText(c_vit + " ⛁", centre_x + 75, centre_y + 82);
                }

                // ============================================
                // BARRE D'ONGLETS FIXE (Tout en bas)
                // ============================================
                ctx.fillStyle = "#1b1c26"; ctx.fillRect(0, bas_y - 60, canvas.width, 60);
                ctx.strokeStyle = "#2d2f45"; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(0, bas_y - 60); ctx.lineTo(canvas.width, bas_y - 60); ctx.stroke();
                
                // Séparateur central
                ctx.beginPath(); ctx.moveTo(canvas.width / 2, bas_y - 60); ctx.lineTo(canvas.width / 2, bas_y); ctx.stroke();

                // Onglet 1 : Boutique (Gauche)
                if (onglet_actif === "BOUTIQUE") { ctx.fillStyle = "#2c2e43"; ctx.fillRect(0, bas_y - 59, canvas.width / 2 - 1, 58); }
                ctx.fillStyle = onglet_actif === "BOUTIQUE" ? "#fff" : "#777"; ctx.font = "bold 14px sans-serif";
                ctx.fillText("🛍️ BOUTIQUE", canvas.width * 0.25, bas_y - 24);

                // Onglet 2 : Combat (Droite)
                if (onglet_actif === "COMBAT") { ctx.fillStyle = "#2c2e43"; ctx.fillRect(canvas.width / 2 + 1, bas_y - 59, canvas.width / 2, 58); }
                ctx.fillStyle = onglet_actif === "COMBAT" ? "#fff" : "#777"; ctx.font = "bold 14px sans-serif";
                ctx.fillText("⚔️ COMBAT", canvas.width * 0.75, bas_y - 24);

                return;
            }

            // JEU ACTIF (Reste inchangé)
            let lChemin = Math.min(canvas.width, canvas.height) * 0.18;
            ctx.strokeStyle = "#3c3c3c"; ctx.lineWidth = lChemin; ctx.lineCap = "round";
            ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(canvas.width, canvas.height); ctx.moveTo(canvas.width, 0); ctx.lineTo(0, canvas.height); ctx.stroke();

            liste_ennemis.forEach(e => {
                ctx.fillStyle = e.couleur; ctx.fillRect(e.x, e.y, e.largeur, e.hauteur);
                ctx.fillStyle = "#000"; ctx.fillRect(e.x, e.y - 12, e.largeur, 6);
                ctx.fillStyle = "#ff0000"; ctx.fillRect(e.x, e.y - 12, Math.max(0, (e.hp / e.max_hp) * e.largeur), 6);
            });

            ctx.fillStyle = "#ffff00"; ctx.fillRect(centre_x - taille_coffre / 2, centre_y - taille_coffre / 2, taille_coffre, taille_coffre);
            let lBarre = Math.min(canvas.width * 0.5, 200);
            ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(centre_x - lBarre / 2, centre_y - taille_coffre / 2 - 22, lBarre, 10);
            ctx.fillStyle = "#00ff00"; ctx.fillRect(centre_x - lBarre / 2, centre_y - taille_coffre / 2 - 22, (hp_coffre / max_hp_coffre) * lBarre, 10);

            popups_degats.forEach(p => { ctx.fillStyle = "#ff3333"; ctx.font = "bold 14px sans-serif"; ctx.textAlign = "center"; ctx.fillText("-" + p.texte, p.x, p.y); });
            ctx.fillStyle = "#333"; ctx.fillRect(0, 0, canvas.width, 6);
            ctx.fillStyle = "#00bfff"; ctx.fillRect(0, 0, (joueur_xp / xp_necessaire) * canvas.width, 6);

            ctx.fillStyle = "#fff"; ctx.font = "bold 15px sans-serif"; ctx.textAlign = "left";
            ctx.fillText("SCORE: " + score, 20, 30); ctx.fillText("OR PARTIE: +" + or_gagne + "⛁", 20, 52); ctx.fillText("NIV. " + joueur_niveau, 20, 74);
            ctx.textAlign = "right"; ctx.fillText("VAGUE: " + vague, canvas.width - 20, 30);

            if (level_up_timer > 0) { ctx.fillStyle = "#00bfff"; ctx.font = "bold 20px sans-serif"; ctx.textAlign = "center"; ctx.fillText("LEVEL UP ! " + message_level_up, centre_x, 40); }

            ctx.fillStyle = types_personnages[perso_choisi].couleur;
            ctx.fillRect(joueur_x, joueur_y, joueur_largeur, joueur_hauteur);

            if (etat_jeu === "GAMEOVER") {
                ctx.fillStyle = "rgba(0, 0, 0, 0.9)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#ff4d4d"; ctx.font = "bold 26px sans-serif"; ctx.textAlign = "center"; ctx.fillText("LE COFFRE A ÉTÉ DÉTRUIT !", centre_x, centre_y - 100);
                ctx.fillStyle = "#aaa"; ctx.font = "18px sans-serif"; ctx.fillText("Score : " + score, centre_x, centre_y - 50);
                ctx.fillStyle = "#ffff00"; ctx.fillText("Or gagné : +" + or_gagne + " ⛁", centre_x, centre_y - 20);

                ctx.fillStyle = "#00ff00"; ctx.fillRect(centre_x - 120, centre_y + 60, 240, 50);
                ctx.fillStyle = "#000"; ctx.font = "bold 18px sans-serif"; ctx.fillText("RETOUR AU MENU ↻", centre_x, centre_y + 92);
            }
        }

        function bouclePrincipale(tempsActuel) {
            let tempsEcoule = tempsActuel - tempsPrecedent;
            if (tempsEcoule > 250) tempsEcoule = 250; 
            tempsPrecedent = tempsActuel;
            accumulateur += tempsEcoule;

            while (accumulateur >= tickRate) {
                updatePhysique();
                accumulateur -= tickRate;
            }

            dessiner();
            requestAnimationFrame(bouclePrincipale);
        }

        window.addEventListener('load', () => {
            chargerDonnees();
            redimensionner();
            tempsPrecedent = performance.now();
            requestAnimationFrame(bouclePrincipale);
        });
    </script>
</body>
</html>
