<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Défends le Coffre ! v2.2</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #111;
            /* CRUCIAL : Interdit complètement au téléphone de scroller ou de rafraîchir la page au toucher */
            overscroll-behavior: none; 
            touch-action: none; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
            user-select: none;
        }
        
        #ecranDeDemarrage {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(17, 17, 17, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            cursor: pointer;
        }
        .gros-bouton {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 20px 50px;
            font-size: 40px;
            font-weight: bold;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
        }

        canvas {
            display: block;
            background-color: #1e1e1e;
        }
    </style>
</head>
<body>

    <div id="ecranDeDemarrage" onclick="lancerLeJeu()">
        <button class="gros-bouton">▶</button>
    </div>

    <canvas id="jeuCanvas"></canvas>

    <script>
        const canvas = document.getElementById("jeuCanvas");
        const ctx = canvas.getContext("2d");

        let taille_coffre = 100; 
        let joueur_largeur = 50;   
        let joueur_hauteur = 50;   
        let joueur_x = 0;
        let joueur_y = 0;
        let cible_x = 0;
        let cible_y = 0;
        let jeu_actif = false;

        function redimensionner() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            let plus_petite_dimension = Math.min(canvas.width, canvas.height);
            taille_coffre = plus_petite_dimension * 0.22; 
            joueur_largeur = plus_petite_dimension * 0.1;
            joueur_hauteur = plus_petite_dimension * 0.1;

            joueur_x = canvas.width / 2 - joueur_largeur / 2;
            joueur_y = canvas.height / 2 - joueur_hauteur / 2 + (taille_coffre * 1.1);
            cible_x = joueur_x;
            cible_y = joueur_y;
        }
        
        window.addEventListener('resize', redimensionner);
        window.addEventListener('orientationchange', () => {
            setTimeout(redimensionner, 200);
        });
        
        redimensionner();

        // --- STATS ---
        let hp_coffre = 10000;
        let max_hp_coffre = 10000;
        let etat_jeu = "JEU"; 

        // --- JOUEUR ---
        let joueur_vitesse = 8; 
        let joueur_degats = 500;
        let mode_tactile = false;

        // --- ENNEMIS ---
        let liste_ennemis = [];
        let dernier_spawn = 0;
        let compteurs_coins = [0, 0, 0, 0]; 

        let touches = {};
        window.addEventListener("keydown", (e) => {
            touches[e.code] = true;
            mode_tactile = false;
        });
        window.addEventListener("keyup", (e) => touches[e.code] = false);

        function enregistrerPositionDoigt(clientX, clientY) {
            if (!jeu_actif) return;
            mode_tactile = true;
            cible_x = clientX - joueur_largeur / 2;
            cible_y = clientY - joueur_hauteur / 2;
        }

        canvas.addEventListener("mousedown", (e) => enregistrerPositionDoigt(e.clientX, e.clientY));
        
        canvas.addEventListener("touchstart", (e) => {
            if(e.touches.length > 0) {
                enregistrerPositionDoigt(e.touches[0].clientX, e.touches[0].clientY);
            }
        });
        
        canvas.addEventListener("touchmove", (e) => {
            e.preventDefault(); 
            if(e.touches.length > 0) {
                cible_x = e.touches[0].clientX - joueur_largeur / 2;
                cible_y = e.touches[0].clientY - joueur_hauteur / 2;
                mode_tactile = true;
            }
        }, { passive: false });

        function faireSpawnEnnemis() {
            let coins = [
                {x: 0, y: 0},                         
                {x: canvas.width, y: 0},              
                {x: 0, y: canvas.height},             
                {x: canvas.width, y: canvas.height}   
            ];

            let e_taille = Math.min(canvas.width, canvas.height) * 0.08;

            coins.forEach((coin, index) => {
                if (compteurs_coins[index] < 10) {
                    liste_ennemis.push({
                        x: coin.x - (e_taille / 2),
                        y: coin.y - (e_taille / 2),
                        largeur: e_taille,
                        hauteur: e_taille,
                        vitesse: 4, 
                        hp: 1000, 
                        max_hp: 1000,
                        degats: 100,
                        invulnerable_timer: 0,
                        coin_origine: index
                    });
                    compteurs_coins[index]++;
                }
            });
        }

        function collision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.largeur &&
                   rect1.x + rect1.largeur > rect2.x &&
                   rect1.y < rect2.y + rect2.hauteur &&
                   rect1.y + rect1.hauteur > rect2.y;
        }

        function lancerLeJeu() {
            document.getElementById("ecranDeDemarrage").style.display = "none";
            jeu_actif = true;
            dernier_spawn = Date.now();
            
            try {
                document.documentElement.requestFullscreen();
            } catch (e) {}

            redimensionner();
            update();
        }

        function update() {
            if (!jeu_actif) return;

            let centre_x = canvas.width / 2;
            let centre_y = canvas.height / 2;

            if (etat_jeu === "JEU") {
                let maintenant = Date.now();
                
                if (maintenant - dernier_spawn > 1000) {
                    faireSpawnEnnemis();
                    dernier_spawn = maintenant;
                }

                if (mode_tactile) {
                    let dx = cible_x - joueur_x;
                    let dy = cible_y - joueur_y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance > joueur_vitesse) {
                        joueur_x += (dx / distance) * joueur_vitesse;
                        joueur_y += (dy / distance) * joueur_vitesse;
                    } else {
                        joueur_x = cible_x;
                        joueur_y = cible_y;
                    }
                } else {
                    if (touches["ArrowLeft"])  joueur_x -= joueur_vitesse;
                    if (touches["ArrowRight"]) joueur_x += joueur_vitesse;
                    if (touches["ArrowUp"])    joueur_y -= joueur_vitesse;
                    if (touches["ArrowDown"])  joueur_y += joueur_vitesse;
                }
                
                if (joueur_x < 0) joueur_x = 0;
                if (joueur_x > canvas.width - joueur_largeur) joueur_x = canvas.width - joueur_largeur;
                if (joueur_y < 0) joueur_y = 0;
                if (joueur_y > canvas.height - joueur_hauteur) joueur_y = canvas.height - joueur_hauteur;

                let rect_coffre = {
                    x: centre_x - taille_coffre / 2,
                    y: centre_y - taille_coffre / 2,
                    largeur: taille_coffre,
                    hauteur: taille_coffre
                };

                let rect_joueur = {x: joueur_x, y: joueur_y, largeur: joueur_largeur, hauteur: joueur_hauteur};

                for (let i = liste_ennemis.length - 1; i >= 0; i--) {
                    let e = liste_ennemis[i];

                    let cible_ennemi_x = centre_x - e.largeur / 2;
                    let cible_ennemi_y = centre_y - e.hauteur / 2;

                    let dx = cible_ennemi_x - e.x;
                    let dy = cible_ennemi_y - e.y;
                    let dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist > e.vitesse) {
                        e.x += (dx / dist) * e.vitesse;
                        e.y += (dy / dist) * e.vitesse;
                    } else {
                        e.x = cible_ennemi_x;
                        e.y = cible_ennemi_y;
                    }

                    if (e.invulnerable_timer > 0) e.invulnerable_timer--;

                    if (collision(rect_joueur, e) && e.invulnerable_timer === 0) {
                        e.hp -= joueur_degats;
                        e.invulnerable_timer = 20; 
                    }

                    if (collision(rect_coffre, e)) {
                        hp_coffre -= e.degats;
                        liste_ennemis.splice(i, 1); 
                        continue;
                    }

                    if (e.hp <= 0) {
                        liste_ennemis.splice(i, 1);
                    }
                }

                if (hp_coffre <= 0) {
                    hp_coffre = 0;
                    etat_jeu = "GAMEOVER";
                }
            }

            dessiner();
            requestAnimationFrame(update);
        }

        function dessiner() {
            ctx.fillStyle = "#1e1e1e";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            let centre_x = canvas.width / 2;
            let centre_y = canvas.height / 2;
            let largeur_chemin = Math.min(canvas.width, canvas.height) * 0.18;

            ctx.strokeStyle = "#3c3c3c";
            ctx.lineWidth = largeur_chemin;
            ctx.lineCap = "round";
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(canvas.width, canvas.height);
            ctx.moveTo(canvas.width, 0);
            ctx.lineTo(0, canvas.height);
            ctx.stroke();

            liste_ennemis.forEach(e => {
                ctx.fillStyle = "#ff4d4d";
                ctx.fillRect(e.x, e.y, e.largeur, e.hauteur);

                ctx.fillStyle = "#000";
                ctx.fillRect(e.x, e.y - 12, e.largeur, 6);
                ctx.fillStyle = "#ff0000";
                let large_vie = (e.hp / e.max_hp) * e.largeur;
                ctx.fillRect(e.x, e.y - 12, large_vie > 0 ? large_vie : 0, 6);
            });

            ctx.fillStyle = "#ffff00";
            ctx.fillRect(centre_x - taille_coffre / 2, centre_y - taille_coffre / 2, taille_coffre, taille_coffre);

            let largeur_barre = Math.min(canvas.width * 0.5, 200);
            ctx.fillStyle = "rgba(0,0,0,0.5)";
            ctx.fillRect(centre_x - largeur_barre / 2, centre_y - taille_coffre / 2 - 22, largeur_barre, 10);
            ctx.fillStyle = "#00ff00";
            ctx.fillRect(centre_x - largeur_barre / 2, centre_y - taille_coffre / 2 - 22, (hp_coffre / max_hp_coffre) * largeur_barre, 10);

            ctx.fillStyle = "#fff";
            ctx.font = "bold 11px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText(hp_coffre + " HP", centre_x, centre_y - taille_coffre / 2 - 28);

            ctx.fillStyle = "#00ff00";
            ctx.fillRect(joueur_x, joueur_y, joueur_largeur, joueur_hauteur);

            if (etat_jeu === "GAMEOVER") {
                ctx.fillStyle = "rgba(0, 0, 0, 0.85)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#ff4d4d";
                ctx.font = "bold 32px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText("LE COFFRE A ÉTÉ DETRUIT !", canvas.width / 2, canvas.height / 2);
                ctx.font = "20px sans-serif";
                ctx.fillStyle = "#fff";
                ctx.fillText("Rafraîchis la page pour rejouer", canvas.width / 2, canvas.height / 2 + 50);
            }
        }

        ctx.fillStyle = "#111";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    </script>
</body>
</html>
